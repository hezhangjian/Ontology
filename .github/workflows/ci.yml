name: Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    name: Verify platform baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          cache: maven
          distribution: temurin
          java-version: '21'
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
          node-version-file: .nvmrc
      - name: Install frontend dependencies
        run: pnpm --dir portal install --frozen-lockfile
      - name: Run fast verification gate
        run: make verify-fast

  repository:
    name: Verify repository conventions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        if: github.event_name == 'pull_request'
        uses: wagoid/commitlint-github-action@v6
      - name: Check line format
        uses: hezhangjian/linelint@main
      - name: Check spelling
        uses: crate-ci/typos@master
