spring:
  application:
    name: ontology
  datasource:
    driver-class-name: org.postgresql.Driver
    password: ${POSTGRES_PASSWORD:ontology}
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/ontology}
    username: ${POSTGRES_USER:ontology}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 4242

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
