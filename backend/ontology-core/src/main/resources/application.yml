spring:
  application:
    name: ontology-core
  config:
    import: optional:configtree:/run/secrets/
  datasource:
    password: ${postgres_password}
    url: ${ONTOLOGY_POSTGRES_URL:jdbc:postgresql://postgres:5432/ontology}
    username: ${ONTOLOGY_POSTGRES_USER:ontology}
  flyway:
    default-schema: control
    schemas: control

connections:
  encryption-key: ${connection_master_key}
  key-version: 1
  test-token-ttl: 15m
  allowed-private-hosts: ${CONNECTIONS_ALLOWED_PRIVATE_HOSTS:minio,postgres,pulsar}
  production-mode: ${CONNECTIONS_PRODUCTION_MODE:false}

pipelines:
  flink-url: ${PIPELINES_FLINK_URL:http://flink-jobmanager:8081}
  grant-ttl: 15m
  internal-core-url: ${PIPELINES_INTERNAL_CORE_URL:http://ontology-core:8000}
  job-jar: ${PIPELINES_JOB_JAR:/app/flink-job.jar}
  platform-topic: persistent://platform/ingestion
  workload-token: ${flink_workload_token}

server:
  port: 8000

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
