spring:
  application:
    name: ontology-core
  config:
    import: optional:configtree:/run/secrets/
  datasource:
    password: ${postgres_password}
    url: ${ONTOLOGY_POSTGRES_URL:jdbc:postgresql://postgres:5432/ontology}
    username: ${ONTOLOGY_POSTGRES_USER:ontology}
  flyway:
    default-schema: control
    schemas: control
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 110MB

connections:
  encryption-key: ${connection_master_key}
  key-version: 1
  test-token-ttl: 15m
  allowed-private-hosts: ${CONNECTIONS_ALLOWED_PRIVATE_HOSTS:minio,postgres,pulsar}
  production-mode: ${CONNECTIONS_PRODUCTION_MODE:false}
  local-csv-minio-url: ${LOCAL_CSV_MINIO_URL:http://minio:9000}
  local-csv-bucket: ${LOCAL_CSV_BUCKET:import-staging}
  local-csv-access-key: ${minio_root_user}
  local-csv-secret-key: ${minio_root_password}
  local-csv-max-files: ${LOCAL_CSV_MAX_FILES:50}
  local-csv-max-file-bytes: ${LOCAL_CSV_MAX_FILE_BYTES:26214400}
  local-csv-max-total-bytes: ${LOCAL_CSV_MAX_TOTAL_BYTES:104857600}

pipelines:
  flink-url: ${PIPELINES_FLINK_URL:http://flink-jobmanager:8081}
  grant-ttl: 15m
  internal-core-url: ${PIPELINES_INTERNAL_CORE_URL:http://ontology-core:8000}
  job-jar: ${PIPELINES_JOB_JAR:/app/flink-job.jar}
  platform-topic: persistent://platform/ingestion
  workload-token: ${flink_workload_token}

modeling:
  hugegraph-url: ${MODELING_HUGEGRAPH_URL:http://hugegraph:8080}
  opensearch-url: ${MODELING_OPENSEARCH_URL:http://opensearch:9200}

explorer:
  hugegraph-url: ${EXPLORER_HUGEGRAPH_URL:http://hugegraph:8080}
  opensearch-url: ${EXPLORER_OPENSEARCH_URL:http://opensearch:9200}
  minio-url: ${EXPLORER_MINIO_URL:http://minio:9000}
  minio-access-key: ${minio_root_user}
  minio-secret-key: ${minio_root_password}
  token-secret: ${flink_workload_token}
  token-ttl: 15m
  export-ttl: 24h
  export-limit: 100000

dashboards:
  token-secret: ${flink_workload_token}
  token-ttl: 15m
  cache-ttl: 60s
  edit-lock-ttl: 15m
  suppression-threshold: 5

server:
  multipart-max-parts: ${SERVER_MULTIPART_MAX_PARTS:100}
  port: 8000

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
