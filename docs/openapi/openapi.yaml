        '201': {description: Generated Dataset, content: {application/json: {schema: {$ref: '#/components/schemas/Dataset'}}}}
        '422': {$ref: '#/components/responses/InvalidRequest'}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorkspaceId:
      name: X-Workspace-Id
      in: header
      description: Active scenario workspace. Defaults to the Token consumption workspace for backward compatibility.
      schema: {type: string, format: uuid}
    AssetId: {name: assetId, in: path, required: true, schema: {type: string, format: uuid}}
    DataSourceId: {name: dataSourceId, in: path, required: true, schema: {type: string, format: uuid}}
    DeploymentId: {name: deploymentId, in: path, required: true, schema: {type: string, format: uuid}}
    BulkJobId: {name: bulkJobId, in: path, required: true, schema: {type: string, format: uuid}}
    DashboardId: {name: dashboardId, in: path, required: true, schema: {type: string, format: uuid}}
    DashboardPlanId: {name: dashboardPlanId, in: path, required: true, schema: {type: string, format: uuid}}
    DashboardVersionId: {name: dashboardVersionId, in: path, required: true, schema: {type: string, format: uuid}}
    DatasetId: {name: datasetId, in: path, required: true, schema: {type: string, format: uuid}}
    ExplorationId: {name: explorationId, in: path, required: true, schema: {type: string, format: uuid}}
    ExportJobId: {name: exportJobId, in: path, required: true, schema: {type: string, format: uuid}}
    ListId: {name: listId, in: path, required: true, schema: {type: string, format: uuid}}
    ModelingResourceId: {name: modelingResourceId, in: path, required: true, schema: {type: string, format: uuid}}
    ObjectId: {name: objectId, in: path, required: true, schema: {type: string, maxLength: 512}}
    ObjectTypeId: {name: objectTypeId, in: path, required: true, schema: {type: string, format: uuid}}
    Page: {name: page, in: query, schema: {type: integer, default: 0, minimum: 0}}
    PipelineId: {name: pipelineId, in: path, required: true, schema: {type: string, format: uuid}}
    PreviewId: {name: previewId, in: path, required: true, schema: {type: string, format: uuid}}
    ProposalId: {name: proposalId, in: path, required: true, schema: {type: string, format: uuid}}
    RunId: {name: runId, in: path, required: true, schema: {type: string, format: uuid}}
    Size: {name: size, in: query, schema: {type: integer, default: 20, minimum: 1, maximum: 100}}
  responses:
    Conflict:
      description: State or optimistic-lock conflict
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Forbidden:
      description: Caller lacks a Builder or Admin role
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Gone:
      description: Signed cursor, selection or export has expired
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    InvalidRequest:
      description: Validation or connection policy failure
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    NotFound:
      description: Resource not found
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    TooManyRequests:
      description: User and target rate limit exceeded
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Unauthorized:
      description: Missing or invalid caller credentials
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Unavailable:
      description: Required object search, graph or export storage is unavailable
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
  schemas:
    CreateOntologyWorkspaceRequest:
      type: object
      required: [apiName, displayName, color]
      properties:
        apiName: {type: string, pattern: '^[a-z][a-z0-9_]{1,159}$'}
        displayName: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 1000, default: ''}
        color: {type: string, pattern: '^#[0-9a-fA-F]{6}$', default: '#3157d5'}
    OntologyWorkspace:
      type: object
      required: [id, apiName, displayName, description, icon, color, objectTypeCount, linkTypeCount, updatedAt]
      properties:
        id: {type: string, format: uuid}
        apiName: {type: string}
        displayName: {type: string}
        description: {type: string}
        icon: {type: string}
        color: {type: string}
        objectTypeCount: {type: integer, format: int64}
        linkTypeCount: {type: integer, format: int64}
        updatedAt: {type: string, format: date-time}
    DatasetField:
      type: object
      required: [name, type, nullable, samples]
      properties:
        name: {type: string}
        type: {type: string, enum: [TEXT, INTEGER, DECIMAL, BOOLEAN, DATE, DATETIME]}
        nullable: {type: boolean}
        samples: {type: array, maxItems: 3, items: {}}
    Dataset:
      type: object
      required: [id, name, description, pipelineId, pipelineName, fields, rowCount, status, ownerName, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        pipelineId: {type: string, format: uuid}
        pipelineName: {type: string}
        fields: {type: array, items: {$ref: '#/components/schemas/DatasetField'}}
        rowCount: {type: integer, format: int64}
        status: {type: string, enum: [BUILDING, READY, FAILED]}
        ownerName: {type: string}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    DatasetPage:
      type: object
      required: [items, total]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Dataset'}}
        total: {type: integer, format: int64}
    DatasetPreview:
      type: object
      required: [columns, rows, total]
      properties:
        columns: {type: array, items: {type: string}}
        rows: {type: array, items: {type: object, additionalProperties: true}}
        total: {type: integer, format: int64}
    DatasetQueryRequest:
      type: object
      required: [dimensions, metrics]
      properties:
        dimensions: {type: array, maxItems: 3, items: {type: string}}
        dimensionSpecs:
          type: array
          maxItems: 3
          description: Optional self-service field roles with server-side time bucketing; takes precedence over dimensions.
          items:
            type: object
            required: [field, label]
            properties:
              field: {type: string}
              label: {type: string}
              timeGrain: {type: string, enum: [NONE, DAY, WEEK, MONTH, QUARTER, YEAR]}
        metrics:
          type: array
          maxItems: 8
          items:
            type: object
            required: [operation, label]
            properties:
              operation: {type: string, enum: [SUM, AVG, MIN, MAX, COUNT, DISTINCT_COUNT, SUM_PER_DISTINCT]}
              field: {type: string}
              distinctField: {type: string}
              label: {type: string}
        filters:
          type: array
          items:
            type: object
            required: [field, operator, values]
            properties:
              field: {type: string}
              operator: {type: string, enum: [EQUALS, FIELD_EQUALS, IN, NOT_IN]}
              values: {type: array, items: {type: string}}
              comparisonField:
                type: string
                description: Right-hand field used when operator is FIELD_EQUALS.
        orderBy: {type: string}
        orderDirection: {type: string, enum: [ASC, DESC]}
        limit: {type: integer, minimum: 1, maximum: 2000}
    DashboardCreateRequest:
      type: object
      required: [name, visibility, refreshPolicy]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000}
        visibility: {type: string, enum: [PRIVATE, USERS, GROUPS, TEAM, ORGANIZATION]}
        refreshPolicy: {type: string, enum: [MANUAL, OFF, 1_MIN, 5_MIN, 15_MIN, 60_MIN]}
        tags: {type: array, items: {type: string, maxLength: 80}}
    DashboardSummary:
      type: object
      required: [id, name, description, lifecycle, pageCount, widgetCount, ownerName, visibility, refreshPolicy, healthStatus, favorite, etag, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        lifecycle: {type: string, enum: [DRAFT, VALIDATING, READY, PUBLISHING, PUBLISHED, VALIDATION_FAILED, PUBLISH_FAILED, ARCHIVED]}
        currentVersion: {type: integer}
        pageCount: {type: integer, minimum: 0, maximum: 10}
        widgetCount: {type: integer, minimum: 0, maximum: 100}
        ownerName: {type: string}
        visibility: {type: string}
        refreshPolicy: {type: string}
        healthStatus: {type: string, enum: [HEALTHY, WARNING, ERROR, UNKNOWN]}
        favorite: {type: boolean}
        etag: {type: integer, format: int64}
        updatedAt: {type: string, format: date-time}
        lastPublishedAt: {type: string, format: date-time}
    DashboardPage:
      type: object
      required: [id, name, description, order]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, minLength: 1, maxLength: 160}
        description: {type: string, maxLength: 4000}
        order: {type: integer, minimum: 0, maximum: 9}
    DashboardDataSource:
      type: object
      required: [id, name, kind, query]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 160}
        kind: {type: string, enum: [DATASET, OBJECT_SET, EXPLORATION, OBJECT_LIST, FUNCTION]}
        objectTypeId: {type: string, format: uuid}
        datasetId: {type: string, format: uuid}
        referenceId: {type: string, format: uuid}
        referenceVersion: {type: integer, minimum: 1}
        query: {type: object, additionalProperties: true, description: Restricted platform query configuration; never native storage DSL.}
        ontologyRevision: {type: integer, format: int64}
    DashboardWidget:
      type: object
      required: [id, pageId, type, title, description, layout, config, interaction]
      properties:
        id: {type: string, format: uuid}
        pageId: {type: string, format: uuid}
        dataSourceId: {type: string, format: uuid}
        type: {type: string, enum: [METRIC, LINE, AREA, BAR, STACKED_BAR, PIE, DONUT, SCATTER, OBJECT_TABLE, PIVOT, MARKDOWN, FILTER, SECTION]}
        title: {type: string, maxLength: 240}
        description: {type: string, maxLength: 4000}
        layout: {type: object, additionalProperties: {type: object, additionalProperties: {type: integer}}}
        config: {type: object, additionalProperties: true, description: Versioned schema-validated widget configuration; scripts and native queries are forbidden.}
        interaction: {type: object, additionalProperties: true}
    DashboardFilterVariable:
      type: object
      required: [id, name, valueType, controlType, scope, required, allowEmpty, sensitive, applyMode]
      properties:
        id: {type: string, format: uuid}
        name: {type: string, maxLength: 160}
        valueType: {type: string}
        controlType: {type: string, enum: [DROPDOWN, MULTISELECT, DATE_RANGE, NUMBER_RANGE, BOOLEAN, OBJECT_REF]}
        scope: {type: string, enum: [GLOBAL, PAGE, WIDGET]}
        scopeId: {type: string, format: uuid}
        defaultValue: {}
        required: {type: boolean}
        allowEmpty: {type: boolean}
        sensitive: {type: boolean}
        applyMode: {type: string, enum: [AUTO, MANUAL, DEFERRED]}
    DashboardFilterBinding:
      type: object
      required: [filterId, dataSourceId, propertyId, operator]
      properties:
        filterId: {type: string, format: uuid}
        dataSourceId: {type: string, format: uuid}
        propertyId: {type: string, format: uuid}
        operator: {type: string, enum: [eq, in, gt, gte, lt, lte, between, starts_with, recent_days]}
    DashboardDefinition:
      type: object
      required: [schemaVersion, pages, dataSources, widgets, filters, filterBindings, settings]
      properties:
        schemaVersion: {type: integer, enum: [1]}
        pages: {type: array, minItems: 1, maxItems: 10, items: {$ref: '#/components/schemas/DashboardPage'}}
        dataSources: {type: array, items: {$ref: '#/components/schemas/DashboardDataSource'}}
        widgets: {type: array, maxItems: 100, items: {$ref: '#/components/schemas/DashboardWidget'}}
        filters: {type: array, maxItems: 10, items: {$ref: '#/components/schemas/DashboardFilterVariable'}}
        filterBindings: {type: array, items: {$ref: '#/components/schemas/DashboardFilterBinding'}}
        settings: {type: object, additionalProperties: true}
    DashboardDraft:
      type: object
      required: [id, dashboardId, definition, etag, status, updatedBy, updatedAt]
      properties:
        id: {type: string, format: uuid}
        dashboardId: {type: string, format: uuid}
        baseVersionId: {type: string, format: uuid}
        definition: {$ref: '#/components/schemas/DashboardDefinition'}
        etag: {type: integer, format: int64}
        status: {type: string}
        updatedBy: {type: string}
        updatedAt: {type: string, format: date-time}
    DashboardVersion:
      type: object
      required: [id, dashboardId, version, definition, schemaVersion, ontologyRevision, queryPlanHash, publishedByName, releaseNotes, healthStatus, publishedAt]
      properties:
        id: {type: string, format: uuid}
        dashboardId: {type: string, format: uuid}
        version: {type: integer, minimum: 1}
        definition: {$ref: '#/components/schemas/DashboardDefinition'}
        schemaVersion: {type: integer}
        ontologyRevision: {type: integer, format: int64}
        queryPlanHash: {type: string, pattern: '^[0-9a-f]{64}$'}
        publishedByName: {type: string}
        releaseNotes: {type: string}
        healthStatus: {type: string}
        publishedAt: {type: string, format: date-time}
    DashboardDetail:
      type: object
      required: [summary, accessRole]
      properties:
        summary: {$ref: '#/components/schemas/DashboardSummary'}
        currentVersion: {$ref: '#/components/schemas/DashboardVersion'}
        activeDraft: {$ref: '#/components/schemas/DashboardDraft'}
        accessRole: {type: string, enum: [VIEWER, EDITOR, OWNER]}
    DashboardEditLock:
      type: object
      required: [dashboardId, holderId, holderName, leaseToken, acquiredAt, expiresAt, editable]
      properties:
        dashboardId: {type: string, format: uuid}
        holderId: {type: string}
        holderName: {type: string}
        leaseToken: {type: string, format: uuid}
        acquiredAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        editable: {type: boolean}
    DashboardValidation:
      type: object
      required: [valid, status, issues, estimatedCost, definitionHash]
      properties:
        valid: {type: boolean}
        status: {type: string}
        issues: {type: array, items: {type: object, required: [severity, code, path, message], properties: {severity: {type: string}, code: {type: string}, path: {type: string}, message: {type: string}}}}
        estimatedCost: {type: integer}
        definitionHash: {type: string, pattern: '^[0-9a-f]{64}$'}
    DashboardPermission:
      type: object
      required: [subjectType, subjectId, role]
      properties:
        subjectType: {type: string, enum: [USER, GROUP, TEAM]}
        subjectId: {type: string}
        role: {type: string, enum: [VIEWER, EDITOR, OWNER]}
    DashboardQueryPlan:
      type: object
      required: [id, dashboardId, versionId, planHash, ontologyRevision, policyRevision, estimatedCost, createdAt]
      properties:
        id: {type: string, format: uuid}
        dashboardId: {type: string, format: uuid}
        versionId: {type: string, format: uuid}
        planHash: {type: string, pattern: '^[0-9a-f]{64}$'}
        ontologyRevision: {type: integer, format: int64}
        policyRevision: {type: integer, format: int64}
        estimatedCost: {type: integer}
        createdAt: {type: string, format: date-time}
    DashboardExecuteRequest:
      type: object
      required: [pageId, widgetIds, filters, refreshId]
      properties:
        pageId: {type: string, format: uuid}
        widgetIds: {type: array, minItems: 1, maxItems: 20, uniqueItems: true, items: {type: string, format: uuid}}
        filters: {type: object, additionalProperties: true, description: Sensitive values are hashed for run metadata and never logged or persisted.}
        refreshId: {type: string, format: uuid}
    DashboardWidgetResult:
      type: object
      required: [widgetId, status, kind, cacheHit, suppressed, queriedAt, watermark, correlationId]
      properties:
        widgetId: {type: string, format: uuid}
        status: {type: string, enum: [SUCCEEDED, FAILED]}
        kind: {type: string}
        data: {}
        cacheHit: {type: boolean}
        suppressed: {type: boolean}
        queriedAt: {type: string, format: date-time}
        watermark: {type: string, format: date-time}
        correlationId: {type: string}
        safeError: {type: string}
    DashboardBatchResult:
      type: object
      required: [queryRunId, status, widgets, cacheHits, watermark, correlationId]
      properties:
        queryRunId: {type: string, format: uuid}
        status: {type: string, enum: [SUCCEEDED, PARTIAL, FAILED]}
        widgets: {type: array, items: {$ref: '#/components/schemas/DashboardWidgetResult'}}
        cacheHits: {type: integer, minimum: 0}
        watermark: {type: string, format: date-time}
        correlationId: {type: string}
    AssetField:
      type: object
      required: [id, name, inferredType, nullable, sensitive]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        inferredType: {type: string}
        originalType: {type: string}
        nullable: {type: boolean}
        sensitive: {type: boolean}
        primaryKeyCandidate: {type: boolean}
        sampleValue: {type: string, description: Masked sample value when authorized}
    AssetPreview:
      type: object
      required: [columns, rows, truncated, maxBytes]
      properties:
        columns: {type: array, items: {type: string}}
        rows: {type: array, items: {type: object, additionalProperties: true}}
        truncated: {type: boolean}
        maxBytes: {type: integer, example: 1048576}
    AssetUsage:
      type: object
      required: [pipelines, restrictedReferences]
      properties:
        pipelines: {type: array, items: {$ref: '#/components/schemas/PipelineSummary'}}
        restrictedReferences: {type: integer, minimum: 0}
    ConnectionConfig:
      type: object
      description: Type-specific non-sensitive settings; credential keys are rejected.
      additionalProperties: true
    ConnectionStatus:
      type: string
      enum: [UNTESTED, TESTING, HEALTHY, HEALTHY_RESTRICTED, ERROR, DISABLED]
    ConnectionTestResult:
      type: object
      required: [requestId, status, stages, assetCount, configFingerprint, expiresAt]
      properties:
        requestId: {type: string, format: uuid}
        status: {$ref: '#/components/schemas/ConnectionStatus'}
        stages: {type: array, items: {$ref: '#/components/schemas/TestStage'}}
        assetCount: {type: integer, minimum: 0}
        configFingerprint: {type: string}
        testToken: {type: string, writeOnly: true, description: Single-purpose opaque token}
        expiresAt: {type: string, format: date-time}
    CreateDataSourceRequest:
      type: object
      required: [name, type, ownerId, config, credential, testToken]
      properties:
        name: {type: string, minLength: 1, maxLength: 160}
        description: {type: string, maxLength: 1000}
        type: {$ref: '#/components/schemas/DataSourceType'}
        ownerId: {type: string, maxLength: 160}
        ownerName: {type: string, maxLength: 240}
        tags: {type: array, maxItems: 20, items: {type: string, maxLength: 40}}
        config: {$ref: '#/components/schemas/ConnectionConfig'}
        credential: {$ref: '#/components/schemas/CredentialInput'}
        testToken: {type: string}
    CredentialInput:
      type: object
      required: [mode]
      properties:
        mode: {type: string, enum: [MANAGED, EXISTING, FILE]}
        name: {type: string, maxLength: 160}
        existingSecretRef: {type: string, format: uuid}
        fileRefs: {type: object, additionalProperties: {type: string, pattern: '^file://[A-Za-z0-9_.-]+$'}}
        values: {type: object, writeOnly: true, additionalProperties: {type: string, maxLength: 8192}}
    CredentialSummary:
      type: object
      required: [id, name, provider, credentialType, status, referenceCount]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        provider: {type: string, enum: [MANAGED, FILE]}
        credentialType: {type: string}
        status: {type: string, enum: [CONFIGURED, EXPIRING, REVOKED]}
        referenceCount: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        rotatedAt: {type: string, format: date-time}
    DataSource:
      type: object
      required: [id, name, type, ownerId, ownerName, config, status, syncStatus, assetCount, version, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        type: {$ref: '#/components/schemas/DataSourceType'}
        ownerId: {type: string}
        ownerName: {type: string}
        tags: {type: array, items: {type: string}}
        config: {$ref: '#/components/schemas/ConnectionConfig'}
        credential: {$ref: '#/components/schemas/CredentialSummary'}
        status: {$ref: '#/components/schemas/ConnectionStatus'}
        syncStatus: {type: string, enum: [NO_TASKS, IDLE, RUNNING, STREAMING, PARTIAL_FAILURE, ALL_FAILURE]}
        assetCount: {type: integer, minimum: 0}
        lastCheckedAt: {type: string, format: date-time}
        lastError: {$ref: '#/components/schemas/Diagnostic'}
        version: {type: integer, format: int64, minimum: 1}
        pipelineReferenceCount: {type: integer, minimum: 0}
        activeRunCount: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    DataSourceAsset:
      type: object
      required: [id, name, fullPath, assetType, status, schemaStatus, fieldCount, permissionStatus, discoveredAt, fields]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        fullPath: {type: string}
        parentPath: {type: string}
        assetType: {type: string, enum: [BUCKET, PREFIX, FILE, DATABASE, SCHEMA, TABLE, VIEW, CLUSTER, TOPIC]}
        status: {type: string, enum: [AVAILABLE, NEW, UNAVAILABLE]}
        schemaStatus: {type: string, enum: [UNKNOWN, READY, CHANGED, ERROR]}
        schemaHash: {type: string}
        schemaVersion: {type: integer, minimum: 0}
        fieldCount: {type: integer, minimum: 0}
        sizeBytes: {type: integer, format: int64, minimum: 0}
        estimatedRows: {type: integer, format: int64, minimum: 0}
        partitionCount: {type: integer, minimum: 0}
        permissionStatus: {type: string, enum: [READABLE, METADATA_ONLY, DENIED]}
        usedByPipeline: {type: boolean}
        discoveredAt: {type: string, format: date-time}
        fields: {type: array, items: {$ref: '#/components/schemas/AssetField'}}
    DataSourceOverview:
      type: object
      required: [connection, health, assetSummary, pipelineSummary, recentRuns, recentActivity, sectionErrors]
      properties:
        connection: {$ref: '#/components/schemas/DataSource'}
        health: {type: array, items: {$ref: '#/components/schemas/TestStage'}}
        assetSummary: {type: object, additionalProperties: {type: integer}}
        pipelineSummary: {type: object, additionalProperties: {type: integer}}
        recentRuns: {type: array, items: {$ref: '#/components/schemas/PipelineRunSummary'}}
        recentActivity: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
        sectionErrors: {type: object, additionalProperties: {$ref: '#/components/schemas/Diagnostic'}}
    DataSourcePage:
      type: object
      required: [items, page, size, total, counts, filters]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/DataSource'}}
        page: {type: integer, minimum: 0}
        size: {type: integer, minimum: 1}
        total: {type: integer, format: int64, minimum: 0}
        counts: {type: object, additionalProperties: {type: integer}}
        filters: {type: object, additionalProperties: true}
    DataSourceType:
      type: string
      enum: [S3_CSV, MYSQL, POSTGRESQL, KAFKA, EXTERNAL_PULSAR]
    Diagnostic:
      type: object
      required: [stage, occurredAt, reason, requestId, suggestion]
      properties:
        stage: {type: string}
        occurredAt: {type: string, format: date-time}
        reason: {type: string}
        requestId: {type: string, format: uuid}
        suggestion: {type: string}
        technicalDetail: {type: string}
    DiscoveryRun:
      type: object
      required: [taskId, status, discoveredCount, startedAt]
      properties:
        taskId: {type: string, format: uuid}
        status: {type: string, enum: [RUNNING, SUCCEEDED, PARTIAL, FAILED]}
        discoveredCount: {type: integer, minimum: 0}
        startedAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        diagnostic: {$ref: '#/components/schemas/Diagnostic'}
    CreatePipelineRequest:
      type: object
      required: [name, template, mode, dataSourceId, sourceAssetId]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 1000}
        template: {type: string, enum: [BLANK, DATABASE_BATCH, FILE_BATCH, KAFKA_STREAM, OBJECT_RELATION, PULSAR_STREAM]}
        mode: {$ref: '#/components/schemas/PipelineMode'}
        dataSourceId: {type: string, format: uuid}
        sourceAssetId: {type: string, format: uuid}
        ownerId: {type: string, maxLength: 160}
        ownerName: {type: string, maxLength: 240}
