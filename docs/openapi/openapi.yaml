openapi: 3.1.0
info:
  title: Ontology Platform API
  version: 0.1.0
  description: >-
    Public HTTP contract for the Ontology Platform. Endpoints are added by the
    earliest phase that delivers their complete vertical slice.
  license:
    identifier: LicenseRef-Proprietary
    name: Proprietary
servers:
  - url: /api
    description: APISIX product gateway
security:
  - bearerAuth: []
paths:
  /agent/v1/conversations:
    get: {operationId: listAgentConversations, summary: List conversations in the current Agent Runtime, responses: {'200': {description: Conversations, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/AgentConversation'}}}}}, '401': {$ref: '#/components/responses/Unauthorized'}}}
    post: {operationId: createAgentConversation, summary: Create an empty conversation, requestBody: {content: {application/json: {schema: {type: object, properties: {title: {type: string, maxLength: 240}}}}}}, responses: {'201': {description: Conversation, content: {application/json: {schema: {$ref: '#/components/schemas/AgentConversation'}}}}, '401': {$ref: '#/components/responses/Unauthorized'}}}
  /agent/v1/conversations/{conversationId}:
    parameters: [{name: conversationId, in: path, required: true, schema: {type: string, format: uuid}}]
    get: {operationId: getAgentConversation, summary: Get conversation messages and grounded tool traces, responses: {'200': {description: Conversation, content: {application/json: {schema: {$ref: '#/components/schemas/AgentConversation'}}}}, '404': {$ref: '#/components/responses/NotFound'}}}
  /agent/v1/conversations/{conversationId}/messages:
    parameters: [{name: conversationId, in: path, required: true, schema: {type: string, format: uuid}}]
    post: {operationId: sendAgentMessage, summary: Stream persisted messages, tool calls, tool results, and answer deltas in execution order, requestBody: {required: true, content: {application/json: {schema: {type: object, required: [content], properties: {content: {type: string, maxLength: 10000}}}}}}, responses: {'200': {description: Server-sent Agent events, content: {text/event-stream: {schema: {type: string}}}}, '422': {$ref: '#/components/responses/InvalidRequest'}}}
  /agent/v1/conversations/{conversationId}/confirm-action:
    parameters: [{name: conversationId, in: path, required: true, schema: {type: string, format: uuid}}]
    post: {operationId: confirmAgentAction, summary: Confirm a caller-bound Action preview from a conversation, requestBody: {required: true, content: {application/json: {schema: {type: object, required: [actionId, previewToken, idempotencyKey], properties: {actionId: {type: string, format: uuid}, previewToken: {type: string}, idempotencyKey: {type: string}}}}}}, responses: {'200': {description: Submitted Action execution, content: {application/json: {schema: {$ref: '#/components/schemas/ActionExecution'}}}}, '401': {$ref: '#/components/responses/Unauthorized'}}}
  /agent/v1/conversations/{conversationId}/confirm-rule-transform:
    parameters: [{name: conversationId, in: path, required: true, schema: {type: string, format: uuid}}]
    post: {operationId: confirmAgentRuleTransform, summary: Insert a reviewed generic RULE_TRANSFORM node into a pipeline draft, requestBody: {required: true, content: {application/json: {schema: {type: object, additionalProperties: true}}}}, responses: {'200': {description: Updated pipeline draft, content: {application/json: {schema: {type: object, additionalProperties: true}}}}, '409': {$ref: '#/components/responses/Conflict'}}}
  /ontology/v1/ontologies:
    get:
      operationId: listScenarioWorkspaces
      summary: List scenario workspaces available to the caller
      description: A scenario workspace scopes data sources, pipelines, datasets, ontology resources, object exploration, and dashboards.
      responses:
        '200':
          description: Available scenario workspaces
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/OntologyWorkspace'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      operationId: createScenarioWorkspace
      summary: Create an independent ontology scenario workspace
      description: The new workspace starts empty and scopes its own data sources, pipelines, datasets, ontology resources, object exploration, and dashboards.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateOntologyWorkspaceRequest'}
      responses:
        '201':
          description: Created ontology workspace
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OntologyWorkspace'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources:
    parameters: [{$ref: '#/components/parameters/WorkspaceId'}]
    get:
      operationId: listDataSources
      summary: List data sources visible to builders and administrators
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 120}}
        - {name: type, in: query, schema: {$ref: '#/components/schemas/DataSourceType'}}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/ConnectionStatus'}}
        - {name: owner, in: query, schema: {type: string, maxLength: 160}}
        - {name: sort, in: query, schema: {type: string, default: 'status,updatedAt', maxLength: 80}}
      responses:
        '200':
          description: A normalized page of data sources
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourcePage'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      operationId: createDataSource
      summary: Atomically create a tested data source and managed credential
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateDataSourceRequest'}
      responses:
        '201':
          description: Created data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources/test:
    post:
      operationId: testTransientDataSource
      summary: Test transient configuration without persisting cleartext credentials
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TestDataSourceRequest'}
      responses:
        '200':
          description: Staged test result and short-lived token
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectionTestResult'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
  /ontology/v1/data-sources/local-csv:
    post:
      operationId: importLocalCsvDataSource
      summary: Import CSV files selected from a local folder
      description: The platform stores and discovers the selected CSV files. Callers do not provide storage endpoints, buckets, credentials, or IDs.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, files]
              properties:
                name:
                  type: string
                  maxLength: 160
                description:
                  type: string
                  maxLength: 1000
                tags:
                  type: array
                  items:
                    type: string
                    maxLength: 80
                files:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Imported and discovered data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources/{dataSourceId}:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: getDataSource
      summary: Get one data source without credential material
      responses:
        '200':
          description: Data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      operationId: updateDataSource
      summary: Update non-sensitive data source settings using optimistic locking
      parameters:
        - {name: If-Match, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateDataSourceRequest'}
      responses:
        '200':
          description: Updated data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
    delete:
      operationId: deleteDataSource
      summary: Permanently delete a data source and its dependent pipelines and runs
      responses:
        '204': {description: Deleted}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/overview:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: getDataSourceOverview
      summary: Get independently recoverable detail sections
      responses:
        '200':
          description: Data source overview
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourceOverview'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/test:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: retestDataSource
      summary: Retest a saved data source
      responses:
        '200':
          description: Updated test result
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectionTestResult'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/disable:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: disableDataSource
      summary: Disable new discovery, previews and pipeline starts
      responses:
        '200':
          description: Disabled data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/enable:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: enableDataSource
      summary: Enable a data source in untested state
      responses:
        '200':
          description: Enabled data source requiring a fresh test
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/rotate-credential:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: rotateDataSourceCredential
      summary: Test and atomically replace credential material
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RotateCredentialRequest'}
      responses:
        '200':
          description: Rotated credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialSummary'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources/{dataSourceId}/assets:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourceAssets
      summary: List cached discovered assets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 160}}
      responses:
        '200':
          description: Asset page
          content:
            application/json:
              schema:
                type: object
                required: [items, page, size, total]
                properties:
                  items: {type: array, items: {$ref: '#/components/schemas/DataSourceAsset'}}
                  page: {type: integer, minimum: 0}
                  size: {type: integer, minimum: 1}
                  total: {type: integer, format: int64, minimum: 0}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/discover:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: discoverDataSourceAssets
      summary: Refresh cached asset metadata
      responses:
        '202':
          description: Completed or accepted discovery run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryRun'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    get:
      operationId: getDataSourceAsset
      summary: Get asset metadata and schema
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourceAsset'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/infer-schema:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    post:
      operationId: inferDataSourceAssetSchema
      summary: Re-infer and version an asset schema
      responses:
        '202':
          description: Schema inference run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryRun'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/preview:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    post:
      operationId: previewDataSourceAsset
      summary: Return a bounded, permission-filtered preview without committing offsets
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: {type: integer, enum: [50, 100], default: 50}
      responses:
        '200':
          description: Bounded preview rows
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AssetPreview'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/usage:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    get:
      operationId: getDataSourceAssetUsage
      summary: Get permission-filtered downstream usage
      responses:
        '200':
          description: Asset usage
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AssetUsage'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/pipelines:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourcePipelines
      summary: List pipelines that reference a data source
      responses:
        '200':
          description: Referencing pipelines
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/PipelineSummary'}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/runs:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourceRuns
      summary: List runs for pipelines that reference a data source
      responses:
        '200':
          description: Referencing pipeline runs
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/PipelineRunSummary'}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/credentials:
    get:
      operationId: listUsableCredentials
      summary: List only usable credential metadata
      parameters:
        - {name: usable, in: query, schema: {type: boolean, default: true}}
      responses:
        '200':
          description: Credential summaries
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/CredentialSummary'}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines:
    get:
      operationId: listPipelines
      summary: List authorized pipelines with independent lifecycle and run health
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 240}}
        - {name: mode, in: query, schema: {$ref: '#/components/schemas/PipelineMode'}}
        - {name: lifecycle, in: query, schema: {$ref: '#/components/schemas/PipelineLifecycle'}}
        - {name: runStatus, in: query, schema: {$ref: '#/components/schemas/PipelineRunStatus'}}
        - {name: owner, in: query, schema: {type: string, maxLength: 160}}
        - {name: sort, in: query, schema: {type: string, enum: [name, lastRun, updatedAt]}}
      responses:
        '200': {description: Pipeline page, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePage'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      operationId: createPipeline
      summary: Create a typed pipeline draft from a controlled source asset
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreatePipelineRequest'}}}}
      responses:
        '201': {description: Created pipeline draft, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/pipelines/{pipelineId}:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: getPipeline
      summary: Get a pipeline and its recoverable team draft
      responses:
        '200': {description: Pipeline, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      operationId: deletePipeline
      summary: Permanently delete a pipeline with its versions, runs, schedules and mappings
      responses:
        '204': {description: Deleted}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/pipelines/{pipelineId}/draft:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    patch:
      operationId: updatePipelineDraft
      summary: Autosave a typed DAG using optimistic locking
      parameters: [{name: If-Match, in: header, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdatePipelineDraftRequest'}}}}
      responses:
        '200': {description: Saved draft, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/pipelines/{pipelineId}/duplicate:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: duplicatePipeline
      summary: Duplicate a pipeline into a new draft
      responses:
        '201': {description: Duplicate, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
  /ontology/v1/pipelines/{pipelineId}/validate:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: validatePipelineDraft
      summary: Validate graph, schema, source, output, batch-stream semantics, runtime and security
      responses:
        '200': {description: Validation result, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineValidation'}}}}
  /ontology/v1/pipelines/{pipelineId}/preview:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: previewPipelineNode
      summary: Submit a bounded Flink preview compiled from the same Pipeline IR operators
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePreviewRequest'}}}}
      responses:
        '202': {description: Submitted preview, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePreview'}}}}
  /ontology/v1/pipelines/{pipelineId}/versions:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: listPipelineVersions
      summary: List immutable published versions
      responses:
        '200': {description: Versions, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineVersion'}}}}}
  /ontology/v1/pipelines/{pipelineId}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/PipelineId'
      - {name: version, in: path, required: true, schema: {type: integer, minimum: 1}}
    get:
      operationId: getPipelineVersion
      summary: Get immutable Pipeline IR and signed Flink job specification
      responses:
        '200': {description: Version, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineVersion'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/pipelines/{pipelineId}/diff:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: diffPipelineDraft
      summary: Compare active immutable version with the team draft and downstream impact
      responses:
        '200': {description: Diff and impact, content: {application/json: {schema: {type: object, additionalProperties: true}}}}
  /ontology/v1/pipelines/{pipelineId}/proposals:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: listPipelineProposals
      summary: List change proposals and decisions
      responses:
        '200': {description: Proposals, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineProposal'}}}}}
    post:
      operationId: createPipelineProposal
      summary: Freeze draft evidence and submit a change proposal
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposalRequest'}}}}
      responses:
        '202': {description: Submitted proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
  /ontology/v1/pipelines/{pipelineId}/proposals/{proposalId}/approve:
    parameters: [{$ref: '#/components/parameters/PipelineId'}, {$ref: '#/components/parameters/ProposalId'}]
    post:
      operationId: approvePipelineProposal
      summary: Approve a proposal; high-risk proposals require Admin
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/PipelineDecisionRequest'}}}}
      responses:
        '200': {description: Approved proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines/{pipelineId}/proposals/{proposalId}/reject:
    parameters: [{$ref: '#/components/parameters/PipelineId'}, {$ref: '#/components/parameters/ProposalId'}]
    post:
      operationId: rejectPipelineProposal
      summary: Reject a pipeline proposal with an audit comment
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/PipelineDecisionRequest'}}}}
      responses:
        '200': {description: Rejected proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
  /ontology/v1/pipelines/{pipelineId}/publish:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: publishPipeline
      summary: Transactionally compile and activate an immutable Pipeline IR version
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PublishPipelineRequest'}}}}
      responses:
        '200': {description: Published immutable version, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineVersion'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/pipelines/{pipelineId}/rollback:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: rollbackPipeline
      summary: Activate a historical version for future runs without reverting business data
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RollbackPipelineRequest'}}}}
      responses:
        '200': {description: Updated pipeline, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines/{pipelineId}/run:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: runBatchPipeline
      summary: Asynchronously run the active immutable batch version
      responses:
        '202': {description: Submitted run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/start:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: startStreamingPipeline
      summary: Start the active immutable stream version, restoring a compatible savepoint when present
      responses:
        '202': {description: Submitted stream run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/stop:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: stopStreamingPipeline
      summary: Stop a stream with a savepoint by default
      requestBody: {content: {application/json: {schema: {type: object, properties: {drain: {type: boolean, default: true}}}}}}
      responses:
        '202': {description: Stop requested, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/savepoint:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: savepointStreamingPipeline
      summary: Trigger a diagnostic Flink savepoint
      responses:
        '202': {description: Savepoint requested, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/reset-offsets:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: resetPipelineOffsets
      summary: Register an Admin-only high-risk offset reset after stop-with-savepoint
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/OffsetResetRequest'}}}}
      responses:
        '200': {description: Updated high-risk draft, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
