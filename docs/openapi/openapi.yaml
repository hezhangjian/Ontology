        createdAt: {type: string, format: date-time}
        startedAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        steps: {type: array, items: {type: object, additionalProperties: true}}
    OntologyHealthIssue:
      type: object
      required: [id, severity, category, title, evidence, recommendation, status, firstSeenAt, lastSeenAt]
      properties:
        id: {type: string, format: uuid}
        severity: {type: string, enum: [INFO, WARNING, ERROR, CRITICAL]}
        category: {type: string}
        resourceId: {type: string, format: uuid}
        resourceName: {type: string}
        title: {type: string}
        evidence: {type: string}
        recommendation: {type: string}
        ownerName: {type: string}
        status: {type: string, enum: [OPEN, ACCEPTED, RESOLVED]}
        firstSeenAt: {type: string, format: date-time}
        lastSeenAt: {type: string, format: date-time}
    ExplorerProperty:
      type: object
      required: [id, apiName, displayName, valueType, primaryKey, titleProperty, searchable, filterable, sortable, sensitive]
      properties:
        id: {type: string, format: uuid}
        apiName: {type: string}
        displayName: {type: string}
        valueType: {type: string}
        primaryKey: {type: boolean}
        titleProperty: {type: boolean}
        searchable: {type: boolean}
        filterable: {type: boolean}
        sortable: {type: boolean}
        sensitive: {type: boolean}
    ExplorerObjectType:
      type: object
      required: [id, apiName, displayName, maturity, ontologyRevision, properties]
      properties:
        id: {type: string, format: uuid}
        apiName: {type: string}
        displayName: {type: string}
        maturity: {type: string}
        ontologyRevision: {type: integer, format: int64}
        properties: {type: array, items: {$ref: '#/components/schemas/ExplorerProperty'}}
    ObjectSetRequest:
      type: object
      required: [objectTypeId, where, sort, pageSize, columns]
      properties:
        objectTypeId: {type: string, format: uuid, description: 'Stable ontology resource ID, never an API name or physical key.'}
        where: {type: object, additionalProperties: true, description: 'Typed platform AST limited to fifty leaves, three logical levels and three one-hop relations.'}
        sort: {type: array, maxItems: 5, items: {type: object, required: [propertyId, direction], properties: {propertyId: {type: string, format: uuid}, direction: {type: string, enum: [asc, desc]}}}}
        pageSize: {type: integer, enum: [25, 50, 100], default: 50}
        cursor: {type: string, description: 'Signed opaque search_after cursor bound to user, query, ontology and policy revision.'}
        columns: {type: array, items: {type: string, format: uuid}}
    ObjectSummary:
      type: object
      required: [objectId, title, objectTypeApiName, objectTypeId, version, ontologyRevision, properties, redactedFields, quality, updatedAt]
      properties:
        objectId: {type: string}
        title: {type: string}
        objectTypeApiName: {type: string}
        objectTypeId: {type: string, format: uuid}
        version: {type: integer, format: int64}
        ontologyRevision: {type: integer, format: int64}
        properties: {type: object, additionalProperties: true, description: Contains authorized non-sensitive properties only.}
        redactedFields: {type: array, items: {type: string, format: uuid}}
        quality: {type: string}
        updatedAt: {type: string, format: date-time}
    ObjectSetPage:
      type: object
      required: [objectTypeId, objectTypeName, ontologyRevision, visibleCount, countLowerBound, items, queryFingerprint, indexUpdatedAt, properties]
      properties:
        objectTypeId: {type: string, format: uuid}
        objectTypeName: {type: string}
        ontologyRevision: {type: integer, format: int64}
        visibleCount: {type: integer, format: int64}
        countLowerBound: {type: boolean}
        items: {type: array, items: {$ref: '#/components/schemas/ObjectSummary'}}
        nextCursor: {type: string}
        queryFingerprint: {type: string, pattern: '^[a-f0-9]{64}$'}
        indexUpdatedAt: {type: string, format: date-time}
        properties: {type: array, items: {$ref: '#/components/schemas/ExplorerProperty'}}
    ObjectFacet:
      type: object
      required: [propertyId, displayName, buckets]
      properties:
        propertyId: {type: string, format: uuid}
        displayName: {type: string}
        buckets: {type: array, maxItems: 100, items: {type: object, required: [value, count], properties: {value: {}, count: {type: integer, format: int64}}}}
    ObjectAggregateRequest:
      type: object
      required: [query, dimensionPropertyIds, aggregation]
      properties:
        query: {$ref: '#/components/schemas/ObjectSetRequest'}
        dimensionPropertyIds: {type: array, minItems: 1, maxItems: 3, items: {type: string, format: uuid}}
        measurePropertyId: {type: string, format: uuid}
        divisorPropertyId: {type: string, format: uuid}
        aggregation: {type: string, enum: [approx_distinct, avg, count, max, min, sum, sum_per_distinct]}
    ObjectAggregateResponse:
      type: object
      required: [objectTypeId, ontologyRevision, queryFingerprint, calculatedAt, buckets]
      properties:
        objectTypeId: {type: string, format: uuid}
        ontologyRevision: {type: integer, format: int64}
        queryFingerprint: {type: string, pattern: '^[a-f0-9]{64}$'}
        calculatedAt: {type: string, format: date-time}
        buckets: {type: array, items: {type: object, required: [value, count, metric], properties: {value: {}, count: {type: integer, format: int64}, metric: {type: number}}}}
    ObjectSearchRequest:
      type: object
      required: [query]
      properties:
        query: {type: string, maxLength: 500, description: 'Restricted words, phrases, trailing term wildcard and platform boolean syntax; no native Lucene or regex.'}
        mode: {type: string, enum: [ALL, ANY, ADVANCED]}
        tab: {type: string, enum: [ALL, OBJECTS, OBJECT_TYPES, EXPLORATIONS, LISTS]}
        size: {type: integer, minimum: 1, maximum: 100}
    ObjectSearchResponse:
      type: object
      required: [objects, objectTypes, explorations, lists, visibleObjectCount, indexUpdatedAt]
      properties:
        objects: {type: array, items: {$ref: '#/components/schemas/ObjectSummary'}}
        objectTypes: {type: array, items: {$ref: '#/components/schemas/ExplorerObjectType'}}
        explorations: {type: array, items: {$ref: '#/components/schemas/SavedExploration'}}
        lists: {type: array, items: {$ref: '#/components/schemas/ObjectList'}}
        visibleObjectCount: {type: integer, format: int64}
        indexUpdatedAt: {type: string, format: date-time}
    ExplorerHome:
      type: object
      required: [objectTypes, objectCounts, recentObjects, explorations, lists, searchStatus, indexUpdatedAt]
      properties:
        objectTypes: {type: array, items: {$ref: '#/components/schemas/ExplorerObjectType'}}
        objectCounts:
          type: object
          additionalProperties: {type: integer, format: int64}
        recentObjects: {type: array, items: {$ref: '#/components/schemas/ObjectSummary'}}
        explorations: {type: array, items: {$ref: '#/components/schemas/SavedExploration'}}
        lists: {type: array, items: {$ref: '#/components/schemas/ObjectList'}}
        searchStatus: {type: string, enum: [HEALTHY, DEGRADED]}
        indexUpdatedAt: {type: string, format: date-time}
    ObjectDetail:
      type: object
      required: [objectId, title, objectType, version, etag, ontologyRevision, properties, redactedFields, quality, updatedAt]
      properties:
        objectId: {type: string}
        title: {type: string}
        objectType: {$ref: '#/components/schemas/ExplorerObjectType'}
        version: {type: integer, format: int64}
        etag: {type: string}
        ontologyRevision: {type: integer, format: int64}
        properties: {type: object, additionalProperties: true}
        redactedFields: {type: array, items: {type: string, format: uuid}}
        quality: {type: string}
        updatedAt: {type: string, format: date-time}
    ObjectLinkPage:
      type: object
      required: [items, visibleCount]
      properties:
        items: {type: array, items: {type: object, additionalProperties: true}}
        nextCursor: {type: string}
        visibleCount: {type: integer, format: int64}
    ExplorationRequest:
      type: object
      required: [name, objectTypeId, query, columns, perspective, visibility]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 2000}
        objectTypeId: {type: string, format: uuid}
        query: {$ref: '#/components/schemas/ObjectSetRequest'}
        columns: {type: array, items: {type: string, format: uuid}}
        perspective: {type: string, enum: [TABLE, CARDS, ANALYSIS, GRAPH, COMPARE]}
        viewConfig: {type: object, additionalProperties: true}
        visibility: {type: string, enum: [PRIVATE, SHARED]}
    SavedExploration:
      allOf:
        - {$ref: '#/components/schemas/ExplorationRequest'}
        - type: object
          required: [id, objectTypeName, ownerName, version, etag, ontologyRevision, updatedAt, warnings]
          properties:
            id: {type: string, format: uuid}
            objectTypeName: {type: string}
            ownerName: {type: string}
            version: {type: integer, minimum: 1}
            etag: {type: integer, format: int64}
            ontologyRevision: {type: integer, format: int64}
            updatedAt: {type: string, format: date-time}
            warnings: {type: array, items: {type: string}}
    ObjectListRequest:
      type: object
      required: [name, objectTypeId, visibility, objectIds]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 2000}
        objectTypeId: {type: string, format: uuid}
        sourceExplorationId: {type: string, format: uuid}
        visibility: {type: string, enum: [PRIVATE, SHARED]}
        objectIds: {type: array, maxItems: 10000, uniqueItems: true, items: {type: string}}
    ObjectList:
      type: object
      required: [id, name, description, objectTypeId, objectTypeName, ownerName, visibility, etag, itemCount, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        objectTypeId: {type: string, format: uuid}
        objectTypeName: {type: string}
        sourceExplorationId: {type: string, format: uuid}
        ownerName: {type: string}
        visibility: {type: string, enum: [PRIVATE, SHARED]}
        etag: {type: integer, format: int64}
        itemCount: {type: integer, format: int64}
        updatedAt: {type: string, format: date-time}
    SelectionRequest:
      type: object
      required: [query]
      properties:
        query: {$ref: '#/components/schemas/ObjectSetRequest'}
        objectIds: {type: array, maxItems: 1000, uniqueItems: true, items: {type: string}}
    SelectionToken:
      type: object
      required: [token, objectTypeId, objectCount, queryFingerprint, expiresAt]
      properties:
        token: {type: string}
        objectTypeId: {type: string, format: uuid}
        objectCount: {type: integer, maximum: 1000}
        queryFingerprint: {type: string}
        expiresAt: {type: string, format: date-time}
    ExportRequest:
      type: object
      required: [query, columns, format]
      properties:
        query: {$ref: '#/components/schemas/ObjectSetRequest'}
        objectIds: {type: array, items: {type: string}}
        columns: {type: array, items: {type: string, format: uuid}}
        format: {type: string, enum: [CSV, IDS]}
    ExportJob:
      type: object
      required: [id, status, format, rowCount, createdAt, expiresAt]
      properties:
        id: {type: string, format: uuid}
        status: {type: string, enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELLED, EXPIRED]}
        format: {type: string, enum: [CSV, IDS]}
        rowCount: {type: integer, format: int64}
        contentHash: {type: string}
        safeError: {type: string}
        createdAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        downloadPath: {type: string}
    BulkActionRequest:
      type: object
      required: [actionId, selectionToken, parameters]
      properties:
        actionId: {type: string, format: uuid}
        selectionToken: {type: string}
        parameters: {type: object, additionalProperties: true}
    BulkActionJob:
      type: object
      required: [id, actionId, status, totalCount, succeededCount, failedCount, skippedCount, createdAt]
      properties:
        id: {type: string, format: uuid}
        actionId: {type: string, format: uuid}
        status: {type: string, enum: [PENDING, RUNNING, SUCCEEDED, PARTIAL, FAILED, CANCELLED]}
        totalCount: {type: integer, maximum: 1000}
        succeededCount: {type: integer}
        failedCount: {type: integer}
        skippedCount: {type: integer}
        createdAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
