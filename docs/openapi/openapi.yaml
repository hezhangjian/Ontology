components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ActionTypeId:
      name: actionTypeId
      in: path
      required: true
      schema: {type: string, format: uuid}
    AgentId:
      name: agentId
      in: path
      required: true
      schema: {type: string, format: uuid}
    AssetId:
      name: assetId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ConnectionId:
      name: connectionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: {type: string, format: uuid}
    Cursor:
      name: cursor
      in: query
      schema: {type: string, maxLength: 2048}
    DashboardId:
      name: dashboardId
      in: path
      required: true
      schema: {type: string, format: uuid}
    DatasetId:
      name: datasetId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    FunctionId:
      name: functionId
      in: path
      required: true
      schema: {type: string, format: uuid}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: {type: string, minLength: 8, maxLength: 200}
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string, minLength: 1, maxLength: 200}
    InterfaceId:
      name: interfaceId
      in: path
      required: true
      schema: {type: string, format: uuid}
    Limit:
      name: limit
      in: query
      schema: {type: integer, minimum: 1, maximum: 200, default: 50}
    LinkTypeId:
      name: linkTypeId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ObjectId:
      name: objectId
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 512}
    ObjectTypeId:
      name: objectTypeId
      in: path
      required: true
      schema: {type: string, format: uuid}
    OntologyId:
      name: ontologyId
      in: path
      required: true
      schema: {type: string, format: uuid}
    PipelineId:
      name: pipelineId
      in: path
      required: true
      schema: {type: string, format: uuid}
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema: {type: string, format: uuid}
    RunId:
      name: runId
      in: path
      required: true
      schema: {type: string, format: uuid}
  headers:
    ETag:
      description: Opaque resource version used with If-Match
      schema: {type: string}
    Location:
      description: URI of the created resource
      schema: {type: string, format: uri-reference}
  responses:
    Problem:
      description: Request failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, traceId]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer, minimum: 400, maximum: 599}
        detail: {type: string}
        instance: {type: string, format: uri-reference}
        code: {type: string, pattern: '^[A-Z][A-Z0-9_]+$'}
        traceId: {type: string}
        violations:
          type: array
          items:
            $ref: '#/components/schemas/Violation'
    Violation:
      type: object
      additionalProperties: false
      required: [path, code, message]
      properties:
        path: {type: string}
        code: {type: string}
        message: {type: string}
    Operation:
      type: object
      additionalProperties: false
      required: [id, kind, status, submittedAt, traceId]
      properties:
        id: {type: string, format: uuid}
        kind: {type: string}
        status: {$ref: '#/components/schemas/RunStatus'}
        submittedAt: {type: string, format: date-time}
        completedAt: {type: [string, 'null'], format: date-time}
        traceId: {type: string}
    RunStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, DEGRADED, FAILED, CANCELLED]
    Lifecycle:
      type: string
      enum: [DRAFT, PUBLISHED, DEPRECATED, RETIRED]
    ApiName:
      type: string
      pattern: '^[A-Za-z][A-Za-z0-9_]{0,159}$'
    ResourceMetadata:
      type: object
      additionalProperties: false
      required: [displayName, apiName, description, ownerId, tags]
      properties:
        displayName: {type: string, minLength: 1, maxLength: 240}
        apiName: {$ref: '#/components/schemas/ApiName'}
        description: {type: string, maxLength: 4000}
        ownerId: {type: string, minLength: 1, maxLength: 240}
        tags:
          type: array
          maxItems: 40
          items: {type: string, minLength: 1, maxLength: 80}
    OntologySummary:
      type: object
      additionalProperties: false
      required: [id, apiName, displayName, activeRevision, role, health]
      properties:
        id: {type: string, format: uuid}
        apiName: {$ref: '#/components/schemas/ApiName'}
        displayName: {type: string}
        activeRevision: {type: integer, minimum: 0}
        role: {type: string, enum: [OWNER, ADMINISTRATOR, BUILDER, OPERATOR, VIEWER]}
        health: {type: string, enum: [HEALTHY, DEGRADED, FAILED]}
    Ontology:
      allOf:
        - $ref: '#/components/schemas/OntologySummary'
        - type: object
          additionalProperties: false
          required: [description, createdAt, updatedAt, etag]
          properties:
            description: {type: string}
            createdAt: {type: string, format: date-time}
            updatedAt: {type: string, format: date-time}
            etag: {type: string}
    CreateOntologyRequest:
      type: object
      additionalProperties: false
      required: [apiName, displayName]
      properties:
        apiName: {$ref: '#/components/schemas/ApiName'}
        displayName: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000, default: ''}
    UpdateOntologyRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        displayName: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000}
    ConnectionType:
      type: string
      enum: [KAFKA, MYSQL, POSTGRESQL, PULSAR, S3]
    ConnectionStatus:
      type: string
      enum: [ACTIVE, DISABLED, DEGRADED, TESTING]
    ConnectionConfiguration:
      oneOf:
        - $ref: '#/components/schemas/KafkaConnectionConfiguration'
        - $ref: '#/components/schemas/JdbcConnectionConfiguration'
        - $ref: '#/components/schemas/PulsarConnectionConfiguration'
        - $ref: '#/components/schemas/S3ConnectionConfiguration'
      discriminator:
        propertyName: type
        mapping:
          KAFKA: '#/components/schemas/KafkaConnectionConfiguration'
          MYSQL: '#/components/schemas/JdbcConnectionConfiguration'
          POSTGRESQL: '#/components/schemas/JdbcConnectionConfiguration'
          PULSAR: '#/components/schemas/PulsarConnectionConfiguration'
          S3: '#/components/schemas/S3ConnectionConfiguration'
    KafkaConnectionConfiguration:
      type: object
      additionalProperties: false
      required: [type, bootstrapServers]
      properties:
        type: {const: KAFKA}
        bootstrapServers: {type: string, minLength: 1}
        securityProtocol: {type: string, enum: [PLAINTEXT, SASL_PLAINTEXT, SASL_SSL, SSL]}
        saslMechanism: {type: string, enum: [PLAIN, SCRAM_SHA_256, SCRAM_SHA_512]}
    JdbcConnectionConfiguration:
      type: object
      additionalProperties: false
      required: [type, host, port, database]
      properties:
        type: {type: string, enum: [MYSQL, POSTGRESQL]}
        host: {type: string, minLength: 1}
        port: {type: integer, minimum: 1, maximum: 65535}
        database: {type: string, minLength: 1}
        sslMode: {type: string, enum: [DISABLE, PREFER, REQUIRE, VERIFY_CA, VERIFY_FULL]}
    PulsarConnectionConfiguration:
      type: object
      additionalProperties: false
      required: [type, serviceUrl]
      properties:
        type: {const: PULSAR}
        serviceUrl: {type: string, format: uri}
        adminUrl: {type: string, format: uri}
    S3ConnectionConfiguration:
      type: object
      additionalProperties: false
      required: [type, endpoint, bucket]
      properties:
        type: {const: S3}
        endpoint: {type: string, format: uri}
        bucket: {type: string, minLength: 3, maxLength: 63}
        region: {type: string}
        pathStyle: {type: boolean, default: false}
    CredentialInput:
      type: object
      additionalProperties: false
      properties:
        username: {type: string, maxLength: 240}
        password: {type: string, format: password, maxLength: 4096, writeOnly: true}
        token: {type: string, format: password, maxLength: 8192, writeOnly: true}
        accessKey: {type: string, format: password, maxLength: 1024, writeOnly: true}
        secretKey: {type: string, format: password, maxLength: 4096, writeOnly: true}
    ConnectionTestRequest:
      type: object
      additionalProperties: false
      required: [configuration, credentials]
      properties:
        configuration: {$ref: '#/components/schemas/ConnectionConfiguration'}
        credentials: {$ref: '#/components/schemas/CredentialInput'}
    ConnectionTestResult:
      type: object
      additionalProperties: false
      required: [success, stages, testedAt, configurationFingerprint]
      properties:
        success: {type: boolean}
        testToken: {type: [string, 'null']}
        expiresAt: {type: [string, 'null'], format: date-time}
        testedAt: {type: string, format: date-time}
        configurationFingerprint: {type: string}
        stages:
          type: array
          items:
            $ref: '#/components/schemas/TestStage'
    TestStage:
      type: object
      additionalProperties: false
      required: [name, status, message]
      properties:
        name: {type: string}
        status: {type: string, enum: [PASSED, FAILED, SKIPPED]}
        message: {type: string}
    CreateConnectionRequest:
      type: object
      additionalProperties: false
      required: [name, configuration, testToken]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000, default: ''}
        configuration: {$ref: '#/components/schemas/ConnectionConfiguration'}
        testToken: {type: string}
    UpdateConnectionRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000}
        status: {type: string, enum: [ACTIVE, DISABLED]}
        configuration: {$ref: '#/components/schemas/ConnectionConfiguration'}
        testToken: {type: string}
    Connection:
      type: object
      additionalProperties: false
      required: [id, name, description, type, status, configuration, assetCount, ownerId, createdAt, updatedAt, etag]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        type: {$ref: '#/components/schemas/ConnectionType'}
        status: {$ref: '#/components/schemas/ConnectionStatus'}
        configuration: {$ref: '#/components/schemas/ConnectionConfiguration'}
        assetCount: {type: integer, minimum: 0}
        ownerId: {type: string}
        lastTestedAt: {type: [string, 'null'], format: date-time}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        etag: {type: string}
    ConnectionPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Connection'}}
        nextCursor: {type: [string, 'null']}
    FieldSchema:
      type: object
      additionalProperties: false
      required: [name, type, nullable, sensitive]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        type: {type: string, enum: [BOOLEAN, DATE, DATETIME, DECIMAL, INTEGER, JSON, LONG, STRING]}
        nullable: {type: boolean}
        sensitive: {type: boolean}
        sampleValues: {type: array, maxItems: 10, items: {}}
    SourceAsset:
      type: object
      additionalProperties: false
      required: [id, connectionId, kind, path, displayName, schemaHash, discoveredAt]
      properties:
        id: {type: string, format: uuid}
        connectionId: {type: string, format: uuid}
        kind: {type: string, enum: [FILE, TABLE, TOPIC]}
        path: {type: string}
        displayName: {type: string}
        schemaHash: {type: string}
        discoveredAt: {type: string, format: date-time}
    SourceAssetDetail:
      allOf:
        - $ref: '#/components/schemas/SourceAsset'
        - type: object
          additionalProperties: false
          required: [fields, samples, truncated]
          properties:
            fields: {type: array, items: {$ref: '#/components/schemas/FieldSchema'}}
            samples: {type: array, items: {$ref: '#/components/schemas/PropertyValueMap'}}
            truncated: {type: boolean}
    PipelineMode:
      type: string
      enum: [BATCH]
    CreatePipelineRequest:
      type: object
      additionalProperties: false
      required: [name, mode, sourceAssetId]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000, default: ''}
        mode: {$ref: '#/components/schemas/PipelineMode'}
        sourceAssetId: {type: string, format: uuid}
    UpdatePipelineRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 4000}
    Pipeline:
      type: object
      additionalProperties: false
      required: [id, name, description, mode, lifecycle, ownerId, createdAt, updatedAt, etag]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        mode: {$ref: '#/components/schemas/PipelineMode'}
        lifecycle: {$ref: '#/components/schemas/Lifecycle'}
        activeVersion: {type: [integer, 'null'], minimum: 1}
        ownerId: {type: string}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        etag: {type: string}
    PipelinePage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Pipeline'}}
        nextCursor: {type: [string, 'null']}
    PipelineDraft:
      type: object
      additionalProperties: false
      required: [pipelineId, graph, graphHash, validation, etag, updatedAt]
      properties:
        pipelineId: {type: string, format: uuid}
        graph: {$ref: '#/components/schemas/PipelineGraph'}
        graphHash: {type: string}
        validation: {$ref: '#/components/schemas/PipelineValidation'}
        etag: {type: string}
        updatedAt: {type: string, format: date-time}
    ReplacePipelineDraftRequest:
      type: object
      additionalProperties: false
      required: [graph]
      properties:
        graph: {$ref: '#/components/schemas/PipelineGraph'}
    PipelineGraph:
      type: object
      additionalProperties: false
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items: {$ref: '#/components/schemas/PipelineNode'}
        edges:
          type: array
          items: {$ref: '#/components/schemas/PipelineEdge'}
    PipelineNode:
      type: object
      additionalProperties: false
      required: [id, type, name, position, config]
      properties:
        id: {type: string, pattern: '^[A-Za-z0-9_-]{1,120}$'}
        type:
          type: string
          enum: [AGGREGATE, CAST, DATASET_OUTPUT, DEDUPLICATE, DERIVE, FILTER, JOIN, LINK_OUTPUT, OBJECT_OUTPUT, QUALITY, RULE_TRANSFORM, SELECT, SOURCE, WINDOW]
        name: {type: string, minLength: 1, maxLength: 160}
        position: {$ref: '#/components/schemas/CanvasPosition'}
        config: {$ref: '#/components/schemas/PipelineNodeConfig'}
    CanvasPosition:
      type: object
      additionalProperties: false
      required: [x, y]
      properties:
        x: {type: number}
        y: {type: number}
    PipelineNodeConfig:
      oneOf:
        - $ref: '#/components/schemas/SourceNodeConfig'
        - $ref: '#/components/schemas/SelectNodeConfig'
        - $ref: '#/components/schemas/FilterNodeConfig'
        - $ref: '#/components/schemas/CastNodeConfig'
        - $ref: '#/components/schemas/DeriveNodeConfig'
        - $ref: '#/components/schemas/DeduplicateNodeConfig'
        - $ref: '#/components/schemas/JoinNodeConfig'
        - $ref: '#/components/schemas/WindowNodeConfig'
        - $ref: '#/components/schemas/AggregateNodeConfig'
        - $ref: '#/components/schemas/QualityNodeConfig'
        - $ref: '#/components/schemas/RuleTransformNodeConfig'
        - $ref: '#/components/schemas/DatasetOutputNodeConfig'
        - $ref: '#/components/schemas/ObjectOutputNodeConfig'
        - $ref: '#/components/schemas/LinkOutputNodeConfig'
    SourceNodeConfig:
      type: object
      additionalProperties: false
      required: [connectionId, assetId]
      properties:
        connectionId: {type: string, format: uuid}
        assetId: {type: string, format: uuid}
        offsetPolicy: {type: string, enum: [EARLIEST, LATEST, SPECIFIC_OFFSETS, TIMESTAMP]}
    SelectNodeConfig:
      type: object
      additionalProperties: false
      required: [fields]
      properties:
        fields:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FieldSelection'
    FieldSelection:
      type: object
      additionalProperties: false
      required: [source, target]
      properties:
        source: {type: string}
        target: {type: string}
    FilterNodeConfig:
      type: object
      additionalProperties: false
      required: [field, operator]
      properties:
        field: {type: string}
        operator: {type: string, enum: [CONTAINS, EQUALS, GREATER_THAN, IS_NOT_NULL, IS_NULL, LESS_THAN, NOT_EQUALS]}
        value: {}
    CastNodeConfig:
      type: object
      additionalProperties: false
      required: [casts, failurePolicy]
      properties:
        casts:
          type: object
          minProperties: 1
          additionalProperties:
            type: string
            enum: [BOOLEAN, DATE, DECIMAL, INT, JSON, LONG, STRING, TIMESTAMP]
        failurePolicy: {type: string, enum: ['NULL', QUARANTINE, STOP]}
    DeriveNodeConfig:
      type: object
      additionalProperties: false
      required: [name, operation]
      properties:
        name: {type: string}
        operation: {type: string, enum: [COALESCE, CONCAT, CONSTANT]}
        value: {}
        left: {type: string}
        right: {type: string}
        separator: {type: string}
        type: {$ref: '#/components/schemas/PropertyType'}
    DeduplicateNodeConfig:
      type: object
      additionalProperties: false
      required: [keys]
      properties:
        keys: {type: array, minItems: 1, items: {type: string}}
        stateTtlMs: {type: integer, minimum: 1000, default: 86400000}
    JoinNodeConfig:
      type: object
      additionalProperties: false
      required: [leftKey, rightKey, joinType, windowSizeMs]
      properties:
        leftKey: {type: string}
        rightKey: {type: string}
        joinType: {type: string, enum: [FULL, INNER, LEFT, RIGHT]}
        windowSizeMs: {type: integer, minimum: 1000}
        lookupPrefix: {type: string, default: right_}
    WindowNodeConfig:
      type: object
      additionalProperties: false
      required: [windowType, windowSizeMs]
      properties:
        windowType: {type: string, enum: [SESSION, SLIDING, TUMBLING]}
        windowSizeMs: {type: integer, minimum: 1000}
        slideMs: {type: integer, minimum: 1000}
        sessionGapMs: {type: integer, minimum: 1000}
        groupBy: {type: array, items: {type: string}}
    AggregateNodeConfig:
      type: object
      additionalProperties: false
      required: [aggregation, groupBy, outputField]
      properties:
        aggregation: {type: string, enum: [AVG, COUNT, COUNT_DISTINCT, MAX, MIN, SUM]}
        field: {type: string}
        groupBy: {type: array, items: {type: string}}
        outputField: {type: string}
        aggregations:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [operation, outputField]
            properties:
              field: {type: string}
              operation: {type: string, enum: [AVG, COUNT, COUNT_DISTINCT, MAX, MIN, SUM]}
              outputField: {type: string}
    QualityNodeConfig:
      type: object
      additionalProperties: false
      required: [field, rule, failureAction]
      properties:
        field: {type: string}
        rule: {type: string, enum: [NOT_NULL, RANGE, REFERENCE, REGEX, TYPE, UNIQUE]}
        failureAction: {type: string, enum: [QUARANTINE, SKIP, STOP]}
    RuleTransformNodeConfig:
      type: object
      additionalProperties: false
      required: [rules]
      properties:
        rules:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [action, field, operator, replacement]
            properties:
              action: {const: REPLACE}
              field: {type: string}
              operator: {type: string, enum: [EQUALS, GREATER_THAN, IS_NULL, LESS_THAN, OUTSIDE_RANGE]}
              min: {type: number}
              max: {type: number}
              value: {}
              replacement: {}
              preserveOriginalAs: {type: string}
              statusField: {type: string}
    DatasetOutputNodeConfig:
      type: object
      additionalProperties: false
      required: [datasetName]
      properties:
        datasetId: {type: string, format: uuid}
        datasetName: {type: string, minLength: 1}
        description: {type: string}
        fieldSelectionMode: {type: string, enum: [ALL, EXPLICIT], default: ALL}
        fieldMappings: {type: array, items: {$ref: '#/components/schemas/FieldSelection'}}
    ObjectOutputNodeConfig:
      type: object
      additionalProperties: false
      required: [objectTypeId, idFields, mappings]
      properties:
        objectTypeId: {type: string, format: uuid}
        idFields: {type: array, minItems: 1, items: {type: string}}
        mappings:
          type: object
          additionalProperties: {type: string}
    LinkOutputNodeConfig:
      type: object
      additionalProperties: false
      required: [relationTypeId, sourceObjectTypeId, sourceIdField, targetObjectTypeId, targetIdField]
      properties:
        relationTypeId: {type: string, format: uuid}
        sourceObjectTypeId: {type: string, format: uuid}
        sourceIdField: {type: string}
        targetObjectTypeId: {type: string, format: uuid}
        targetIdField: {type: string}
        relationIdField: {type: string}
    PipelineEdge:
      type: object
      additionalProperties: false
      required: [id, source, target]
      properties:
        id: {type: string}
        source: {type: string}
        target: {type: string}
        sourcePort: {type: string}
        targetPort: {type: string}
    PipelineValidation:
      type: object
      additionalProperties: false
      required: [valid, graphHash, issues]
      properties:
        valid: {type: boolean}
        graphHash: {type: string}
        issues: {type: array, items: {$ref: '#/components/schemas/ValidationIssue'}}
    ValidationIssue:
      type: object
      additionalProperties: false
      required: [code, category, severity, message]
      properties:
        code: {type: string}
        category: {type: string, enum: [GRAPH, OUTPUT, RUNTIME, SCHEMA, SECURITY]}
        severity: {type: string, enum: [INFO, WARNING, ERROR]}
        nodeId: {type: [string, 'null']}
        path: {type: [string, 'null']}
        message: {type: string}
        recovery: {type: [string, 'null']}
    CreatePipelinePreviewRequest:
      type: object
      additionalProperties: false
      required: [nodeId, rowLimit]
      properties:
        nodeId: {type: string}
        rowLimit: {type: integer, minimum: 1, maximum: 1000, default: 100}
    PipelinePreview:
      type: object
      additionalProperties: false
      required: [id, pipelineId, graphHash, nodeId, status, submittedAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        graphHash: {type: string}
        nodeId: {type: string}
        status: {$ref: '#/components/schemas/RunStatus'}
        fields: {type: array, items: {$ref: '#/components/schemas/FieldSchema'}}
        rows: {type: array, items: {$ref: '#/components/schemas/PropertyValueMap'}}
        truncated: {type: boolean, default: false}
        submittedAt: {type: string, format: date-time}
        completedAt: {type: [string, 'null'], format: date-time}
    PublishRequest:
      type: object
      additionalProperties: false
      properties:
        comment: {type: string, maxLength: 2000}
    PipelineVersion:
      type: object
      additionalProperties: false
      required: [id, pipelineId, version, graphHash, graph, publishedBy, publishedAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        version: {type: integer, minimum: 1}
        graphHash: {type: string}
        graph: {$ref: '#/components/schemas/PipelineGraph'}
        publishedBy: {type: string}
        publishedAt: {type: string, format: date-time}
    CreatePipelineRunRequest:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        version: {type: integer, minimum: 1}
        mode: {type: string, enum: [RUN, START_STREAM]}
        restoreSavepoint: {type: [string, 'null'], format: uri}
    PipelineRun:
      type: object
      additionalProperties: false
      required: [id, pipelineId, pipelineVersion, status, stage, submittedAt, correlationId, traceId]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        pipelineVersion: {type: integer}
        status: {$ref: '#/components/schemas/RunStatus'}
        stage: {type: string, enum: [SUBMITTED, STARTING, READING, TRANSFORMING, PUBLISHING, PROJECTING, COMPLETED]}
        submittedAt: {type: string, format: date-time}
        startedAt: {type: [string, 'null'], format: date-time}
        completedAt: {type: [string, 'null'], format: date-time}
        correlationId: {type: string}
        traceId: {type: string}
    PipelineRunPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/PipelineRun'}}
        nextCursor: {type: [string, 'null']}
    PipelineRunDetail:
      allOf:
        - $ref: '#/components/schemas/PipelineRun'
        - type: object
          additionalProperties: false
          required: [metrics, events]
          properties:
            metrics: {$ref: '#/components/schemas/RunMetrics'}
            events: {type: array, items: {$ref: '#/components/schemas/RunEvent'}}
            safeError: {type: [string, 'null']}
    RunMetrics:
      type: object
      additionalProperties: false
      required: [readCount, writtenCount, rejectedCount]
      properties:
        readCount: {type: integer, minimum: 0}
        writtenCount: {type: integer, minimum: 0}
        rejectedCount: {type: integer, minimum: 0}
    RunEvent:
      type: object
      additionalProperties: false
      required: [stage, message, occurredAt]
      properties:
        stage: {type: string}
        message: {type: string}
        occurredAt: {type: string, format: date-time}
    Dataset:
      type: object
      additionalProperties: false
      required: [id, name, description, status, ownerId, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        status: {type: string, enum: [BUILDING, READY, DEGRADED, FAILED, ARCHIVED]}
        currentVersionId: {type: [string, 'null'], format: uuid}
        ownerId: {type: string}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    DatasetPage:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Dataset'}}
        nextCursor: {type: [string, 'null']}
    DatasetVersion:
      type: object
      additionalProperties: false
      required: [id, datasetId, version, schema, rowCount, manifestUri, pipelineRunId, createdAt]
      properties:
        id: {type: string, format: uuid}
        datasetId: {type: string, format: uuid}
        version: {type: integer, minimum: 1}
        schema: {type: array, items: {$ref: '#/components/schemas/FieldSchema'}}
        rowCount: {type: integer, minimum: 0}
        manifestUri: {type: string, format: uri}
        pipelineRunId: {type: string, format: uuid}
        sourceWatermark: {type: [string, 'null']}
        createdAt: {type: string, format: date-time}
    DatasetPreview:
      type: object
      additionalProperties: false
      required: [datasetVersionId, schema, rows, truncated, sourceWatermark]
      properties:
        datasetVersionId: {type: string, format: uuid}
        schema: {type: array, items: {$ref: '#/components/schemas/FieldSchema'}}
        rows: {type: array, items: {$ref: '#/components/schemas/PropertyValueMap'}}
        nextCursor: {type: [string, 'null']}
        truncated: {type: boolean}
        sourceWatermark: {type: [string, 'null']}
    DatasetQueryRequest:
      type: object
      additionalProperties: false
      required: [datasetVersionId]
      properties:
        datasetVersionId: {type: string, format: uuid}
        dimensions: {type: array, maxItems: 5, items: {$ref: '#/components/schemas/DimensionSpec'}}
        metrics: {type: array, maxItems: 12, items: {$ref: '#/components/schemas/MetricSpec'}}
        filters: {type: array, maxItems: 40, items: {$ref: '#/components/schemas/FieldFilter'}}
        orderBy: {type: array, maxItems: 5, items: {$ref: '#/components/schemas/OrderSpec'}}
        limit: {type: integer, minimum: 1, maximum: 5000, default: 500}
    DimensionSpec:
      type: object
      additionalProperties: false
      required: [field, label]
      properties:
        field: {type: string}
        label: {type: string}
        timeGrain: {type: string, enum: [DAY, WEEK, MONTH, QUARTER, YEAR]}
    MetricSpec:
      type: object
      additionalProperties: false
      required: [operation, label]
      properties:
        operation: {type: string, enum: [COUNT, DISTINCT_COUNT, SUM, AVG, MIN, MAX, SUM_PER_DISTINCT]}
        field: {type: string}
        divisorField: {type: string}
        label: {type: string}
    FieldFilter:
      type: object
      additionalProperties: false
      required: [field, operator]
      properties:
        field: {type: string}
        operator: {type: string, enum: [EQ, NE, GT, GTE, LT, LTE, BETWEEN, IN, NOT_IN, IS_NULL, IS_NOT_NULL, CONTAINS]}
        value: {}
