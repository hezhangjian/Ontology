openapi: 3.1.0
info:
  title: Ontology Platform API
  version: 0.1.0
  description: >-
    Public HTTP contract for the Ontology Platform. Endpoints are added by the
    earliest phase that delivers their complete vertical slice.
  license:
    identifier: LicenseRef-Proprietary
    name: Proprietary
servers:
  - url: /api
    description: APISIX product gateway
security:
  - bearerAuth: []
paths:
  /ontology/v1/data-sources:
    get:
      operationId: listDataSources
      summary: List data sources visible to builders and administrators
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 120}}
        - {name: type, in: query, schema: {$ref: '#/components/schemas/DataSourceType'}}
        - {name: status, in: query, schema: {$ref: '#/components/schemas/ConnectionStatus'}}
        - {name: owner, in: query, schema: {type: string, maxLength: 160}}
        - {name: sort, in: query, schema: {type: string, default: 'status,updatedAt', maxLength: 80}}
      responses:
        '200':
          description: A normalized page of data sources
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourcePage'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      operationId: createDataSource
      summary: Atomically create a tested data source and managed credential
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateDataSourceRequest'}
      responses:
        '201':
          description: Created data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources/test:
    post:
      operationId: testTransientDataSource
      summary: Test transient configuration without persisting cleartext credentials
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/TestDataSourceRequest'}
      responses:
        '200':
          description: Staged test result and short-lived token
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectionTestResult'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
        '429': {$ref: '#/components/responses/TooManyRequests'}
  /ontology/v1/data-sources/{dataSourceId}:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: getDataSource
      summary: Get one data source without credential material
      responses:
        '200':
          description: Data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      operationId: updateDataSource
      summary: Update non-sensitive data source settings using optimistic locking
      parameters:
        - {name: If-Match, in: header, required: true, schema: {type: string}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateDataSourceRequest'}
      responses:
        '200':
          description: Updated data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
    delete:
      operationId: deleteDataSource
      summary: Permanently delete an eligible disabled data source (Admin only)
      responses:
        '204': {description: Deleted}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/overview:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: getDataSourceOverview
      summary: Get independently recoverable detail sections
      responses:
        '200':
          description: Data source overview
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourceOverview'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/test:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: retestDataSource
      summary: Retest a saved data source
      responses:
        '200':
          description: Updated test result
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ConnectionTestResult'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/disable:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: disableDataSource
      summary: Disable new discovery, previews and pipeline starts
      responses:
        '200':
          description: Disabled data source
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/enable:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: enableDataSource
      summary: Enable a data source in untested state
      responses:
        '200':
          description: Enabled data source requiring a fresh test
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSource'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/rotate-credential:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: rotateDataSourceCredential
      summary: Test and atomically replace credential material
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/RotateCredentialRequest'}
      responses:
        '200':
          description: Rotated credential metadata
          content:
            application/json:
              schema: {$ref: '#/components/schemas/CredentialSummary'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/data-sources/{dataSourceId}/assets:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourceAssets
      summary: List cached discovered assets
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 160}}
      responses:
        '200':
          description: Asset page
          content:
            application/json:
              schema:
                type: object
                required: [items, page, size, total]
                properties:
                  items: {type: array, items: {$ref: '#/components/schemas/DataSourceAsset'}}
                  page: {type: integer, minimum: 0}
                  size: {type: integer, minimum: 1}
                  total: {type: integer, format: int64, minimum: 0}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/discover:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    post:
      operationId: discoverDataSourceAssets
      summary: Refresh cached asset metadata
      responses:
        '202':
          description: Completed or accepted discovery run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryRun'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    get:
      operationId: getDataSourceAsset
      summary: Get asset metadata and schema
      responses:
        '200':
          description: Asset detail
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DataSourceAsset'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/infer-schema:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    post:
      operationId: inferDataSourceAssetSchema
      summary: Re-infer and version an asset schema
      responses:
        '202':
          description: Schema inference run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscoveryRun'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/preview:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    post:
      operationId: previewDataSourceAsset
      summary: Return a bounded, permission-filtered preview without committing offsets
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit: {type: integer, enum: [50, 100], default: 50}
      responses:
        '200':
          description: Bounded preview rows
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AssetPreview'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/data-sources/{dataSourceId}/assets/{assetId}/usage:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
      - $ref: '#/components/parameters/AssetId'
    get:
      operationId: getDataSourceAssetUsage
      summary: Get permission-filtered downstream usage
      responses:
        '200':
          description: Asset usage
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AssetUsage'}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/pipelines:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourcePipelines
      summary: List pipelines that reference a data source
      responses:
        '200':
          description: Referencing pipelines
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/PipelineSummary'}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/data-sources/{dataSourceId}/runs:
    parameters:
      - $ref: '#/components/parameters/DataSourceId'
    get:
      operationId: listDataSourceRuns
      summary: List runs for pipelines that reference a data source
      responses:
        '200':
          description: Referencing pipeline runs
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/PipelineRunSummary'}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/credentials:
    get:
      operationId: listUsableCredentials
      summary: List only usable credential metadata
      parameters:
        - {name: usable, in: query, schema: {type: boolean, default: true}}
      responses:
        '200':
          description: Credential summaries
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/CredentialSummary'}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines:
    get:
      operationId: listPipelines
      summary: List authorized pipelines with independent lifecycle and run health
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - {name: search, in: query, schema: {type: string, maxLength: 240}}
        - {name: mode, in: query, schema: {$ref: '#/components/schemas/PipelineMode'}}
        - {name: lifecycle, in: query, schema: {$ref: '#/components/schemas/PipelineLifecycle'}}
        - {name: runStatus, in: query, schema: {$ref: '#/components/schemas/PipelineRunStatus'}}
        - {name: owner, in: query, schema: {type: string, maxLength: 160}}
        - {name: sort, in: query, schema: {type: string, enum: [name, lastRun, updatedAt]}}
      responses:
        '200': {description: Pipeline page, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePage'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      operationId: createPipeline
      summary: Create a typed pipeline draft from a controlled source asset
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreatePipelineRequest'}}}}
      responses:
        '201': {description: Created pipeline draft, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/pipelines/{pipelineId}:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: getPipeline
      summary: Get a pipeline and its recoverable team draft
      responses:
        '200': {description: Pipeline, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      operationId: deletePipelineDraft
      summary: Permanently delete an unpublished pipeline without runs
      responses:
        '204': {description: Deleted}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/pipelines/{pipelineId}/draft:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    patch:
      operationId: updatePipelineDraft
      summary: Autosave a typed DAG using optimistic locking
      parameters: [{name: If-Match, in: header, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdatePipelineDraftRequest'}}}}
      responses:
        '200': {description: Saved draft, headers: {ETag: {schema: {type: string}}}, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/pipelines/{pipelineId}/duplicate:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: duplicatePipeline
      summary: Duplicate a pipeline into a new draft
      responses:
        '201': {description: Duplicate, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
  /ontology/v1/pipelines/{pipelineId}/validate:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: validatePipelineDraft
      summary: Validate graph, schema, source, output, batch-stream semantics, runtime and security
      responses:
        '200': {description: Validation result, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineValidation'}}}}
  /ontology/v1/pipelines/{pipelineId}/preview:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: previewPipelineNode
      summary: Submit a bounded Flink preview compiled from the same Pipeline IR operators
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePreviewRequest'}}}}
      responses:
        '202': {description: Submitted preview, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePreview'}}}}
  /ontology/v1/pipelines/{pipelineId}/versions:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: listPipelineVersions
      summary: List immutable published versions
      responses:
        '200': {description: Versions, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineVersion'}}}}}
  /ontology/v1/pipelines/{pipelineId}/versions/{version}:
    parameters:
      - $ref: '#/components/parameters/PipelineId'
      - {name: version, in: path, required: true, schema: {type: integer, minimum: 1}}
    get:
      operationId: getPipelineVersion
      summary: Get immutable Pipeline IR and signed Flink job specification
      responses:
        '200': {description: Version, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineVersion'}}}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/pipelines/{pipelineId}/diff:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: diffPipelineDraft
      summary: Compare active immutable version with the team draft and downstream impact
      responses:
        '200': {description: Diff and impact, content: {application/json: {schema: {type: object, additionalProperties: true}}}}
  /ontology/v1/pipelines/{pipelineId}/proposals:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: listPipelineProposals
      summary: List change proposals and decisions
      responses:
        '200': {description: Proposals, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineProposal'}}}}}
    post:
      operationId: createPipelineProposal
      summary: Freeze draft evidence and submit a change proposal
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposalRequest'}}}}
      responses:
        '202': {description: Submitted proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
  /ontology/v1/pipelines/{pipelineId}/proposals/{proposalId}/approve:
    parameters: [{$ref: '#/components/parameters/PipelineId'}, {$ref: '#/components/parameters/ProposalId'}]
    post:
      operationId: approvePipelineProposal
      summary: Approve a proposal; high-risk proposals require Admin
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/PipelineDecisionRequest'}}}}
      responses:
        '200': {description: Approved proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines/{pipelineId}/proposals/{proposalId}/reject:
    parameters: [{$ref: '#/components/parameters/PipelineId'}, {$ref: '#/components/parameters/ProposalId'}]
    post:
      operationId: rejectPipelineProposal
      summary: Reject a pipeline proposal with an audit comment
      requestBody: {content: {application/json: {schema: {$ref: '#/components/schemas/PipelineDecisionRequest'}}}}
      responses:
        '200': {description: Rejected proposal, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineProposal'}}}}
  /ontology/v1/pipelines/{pipelineId}/publish:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: publishPipeline
      summary: Transactionally compile and activate an immutable Pipeline IR version
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PublishPipelineRequest'}}}}
      responses:
        '200': {description: Published immutable version, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineVersion'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
        '422': {$ref: '#/components/responses/InvalidRequest'}
  /ontology/v1/pipelines/{pipelineId}/rollback:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: rollbackPipeline
      summary: Activate a historical version for future runs without reverting business data
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RollbackPipelineRequest'}}}}
      responses:
        '200': {description: Updated pipeline, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipelines/{pipelineId}/run:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: runBatchPipeline
      summary: Asynchronously run the active immutable batch version
      responses:
        '202': {description: Submitted run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/start:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: startStreamingPipeline
      summary: Start the active immutable stream version, restoring a compatible savepoint when present
      responses:
        '202': {description: Submitted stream run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/stop:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: stopStreamingPipeline
      summary: Stop a stream with a savepoint by default
      requestBody: {content: {application/json: {schema: {type: object, properties: {drain: {type: boolean, default: true}}}}}}
      responses:
        '202': {description: Stop requested, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/savepoint:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: savepointStreamingPipeline
      summary: Trigger a diagnostic Flink savepoint
      responses:
        '202': {description: Savepoint requested, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipelines/{pipelineId}/reset-offsets:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: resetPipelineOffsets
      summary: Register an Admin-only high-risk offset reset after stop-with-savepoint
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/OffsetResetRequest'}}}}
      responses:
        '200': {description: Updated high-risk draft, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
        '409': {$ref: '#/components/responses/Conflict'}
  /ontology/v1/pipelines/{pipelineId}/pause:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: pausePipeline
      summary: Pause new runs and stop an active stream
      responses:
        '200': {description: Paused pipeline, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
  /ontology/v1/pipelines/{pipelineId}/resume:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: resumePipeline
      summary: Restore eligibility for new runs
      responses:
        '200': {description: Resumed pipeline, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
  /ontology/v1/pipelines/{pipelineId}/archive:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    post:
      operationId: archivePipeline
      summary: Archive a stopped pipeline while retaining versions, runs and lineage
      responses:
        '200': {description: Archived pipeline, content: {application/json: {schema: {$ref: '#/components/schemas/Pipeline'}}}}
  /ontology/v1/pipelines/{pipelineId}/runs:
    parameters: [{$ref: '#/components/parameters/PipelineId'}]
    get:
      operationId: listPipelineRuns
      summary: List runs pinned to exact immutable versions
      parameters: [{$ref: '#/components/parameters/Page'}, {$ref: '#/components/parameters/Size'}]
      responses:
        '200': {description: Run page, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRunPage'}}}}
  /ontology/v1/pipeline-runs/{runId}:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    get:
      operationId: getPipelineRun
      summary: Get authoritative stages, events, metrics and safe logs
      responses:
        '200': {description: Run detail, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRunDetail'}}}}
  /ontology/v1/pipeline-runs/{runId}/events:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    get:
      operationId: listPipelineRunEvents
      summary: List durable run events
      responses:
        '200': {description: Events, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineRunEvent'}}}}}
  /ontology/v1/pipeline-runs/{runId}/events/stream:
    parameters:
      - {$ref: '#/components/parameters/RunId'}
      - {in: query, name: afterSequence, schema: {type: integer, format: int64, minimum: 0, default: 0}, description: Resume strictly after this durable event sequence}
    get:
      operationId: streamPipelineRunEvents
      summary: Stream durable run events without submitting or mutating the Flink job
      responses:
        '200': {description: Server-sent run events, content: {text/event-stream: {schema: {type: string}}}}
        '404': {$ref: '#/components/responses/NotFound'}
  /ontology/v1/pipeline-runs/{runId}/logs:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    get:
      operationId: listPipelineRunLogs
      summary: List safe control-plane logs without credential material
      responses:
        '200': {description: Safe logs, content: {application/json: {schema: {type: array, items: {type: object, additionalProperties: true}}}}}
  /ontology/v1/pipeline-runs/{runId}/metrics:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    get:
      operationId: getPipelineRunMetrics
      summary: Get durable run and projection counters
      responses:
        '200': {description: Metrics, content: {application/json: {schema: {type: object, additionalProperties: true}}}}
  /ontology/v1/pipeline-runs/{runId}/cancel:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      operationId: cancelPipelineRun
      summary: Cancel Flink execution without reverting projected business data
      responses:
        '202': {description: Cancellation requested, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipeline-runs/{runId}/retry:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      operationId: retryPipelineRun
      summary: Create a new run pinned to the original version and retry_of
      responses:
        '202': {description: Retry run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
  /ontology/v1/pipeline-runs/{runId}/replay-dlq:
    parameters: [{$ref: '#/components/parameters/RunId'}]
    post:
      operationId: replayPipelineDlq
      summary: Admin-only Projection DLQ replay without rereading the source
      responses:
        '202': {description: Replay run, content: {application/json: {schema: {$ref: '#/components/schemas/PipelineRun'}}}}
        '403': {$ref: '#/components/responses/Forbidden'}
  /ontology/v1/pipeline-node-types:
    get:
      operationId: listPipelineNodeTypes
      summary: List supported typed DAG nodes and mode constraints
      responses:
        '200': {description: Node types, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/PipelineNodeType'}}}}}
  /ontology/v1/pipeline-previews/{previewId}:
    parameters: [{$ref: '#/components/parameters/PreviewId'}]
    get:
      operationId: getPipelinePreview
      summary: Get bounded asynchronous Flink preview status and masked rows
      responses:
        '200': {description: Preview, content: {application/json: {schema: {$ref: '#/components/schemas/PipelinePreview'}}}}
  /ontology/v1/pipeline-previews/{previewId}/cancel:
    parameters: [{$ref: '#/components/parameters/PreviewId'}]
    post:
      operationId: cancelPipelinePreview
      summary: Cancel a bounded Flink preview
      responses:
        '202': {description: Cancellation requested}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AssetId: {name: assetId, in: path, required: true, schema: {type: string, format: uuid}}
    DataSourceId: {name: dataSourceId, in: path, required: true, schema: {type: string, format: uuid}}
    Page: {name: page, in: query, schema: {type: integer, default: 0, minimum: 0}}
    PipelineId: {name: pipelineId, in: path, required: true, schema: {type: string, format: uuid}}
    PreviewId: {name: previewId, in: path, required: true, schema: {type: string, format: uuid}}
    ProposalId: {name: proposalId, in: path, required: true, schema: {type: string, format: uuid}}
    RunId: {name: runId, in: path, required: true, schema: {type: string, format: uuid}}
    Size: {name: size, in: query, schema: {type: integer, default: 20, minimum: 1, maximum: 100}}
  responses:
    Conflict:
      description: State or optimistic-lock conflict
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    Forbidden:
      description: Caller lacks a Builder or Admin role
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    InvalidRequest:
      description: Validation or connection policy failure
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    NotFound:
      description: Resource not found
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
    TooManyRequests:
      description: User and target rate limit exceeded
      content: {application/problem+json: {schema: {$ref: '#/components/schemas/Problem'}}}
  schemas:
    AssetField:
      type: object
      required: [id, name, inferredType, nullable, sensitive]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        inferredType: {type: string}
        originalType: {type: string}
        nullable: {type: boolean}
        sensitive: {type: boolean}
        primaryKeyCandidate: {type: boolean}
        sampleValue: {type: string, description: Masked sample value when authorized}
    AssetPreview:
      type: object
      required: [columns, rows, truncated, maxBytes]
      properties:
        columns: {type: array, items: {type: string}}
        rows: {type: array, items: {type: object, additionalProperties: true}}
        truncated: {type: boolean}
        maxBytes: {type: integer, example: 1048576}
    AssetUsage:
      type: object
      required: [pipelines, restrictedReferences]
      properties:
        pipelines: {type: array, items: {$ref: '#/components/schemas/PipelineSummary'}}
        restrictedReferences: {type: integer, minimum: 0}
    ConnectionConfig:
      type: object
      description: Type-specific non-sensitive settings; credential keys are rejected.
      additionalProperties: true
    ConnectionStatus:
      type: string
      enum: [UNTESTED, TESTING, HEALTHY, HEALTHY_RESTRICTED, ERROR, DISABLED]
    ConnectionTestResult:
      type: object
      required: [requestId, status, stages, assetCount, configFingerprint, expiresAt]
      properties:
        requestId: {type: string, format: uuid}
        status: {$ref: '#/components/schemas/ConnectionStatus'}
        stages: {type: array, items: {$ref: '#/components/schemas/TestStage'}}
        assetCount: {type: integer, minimum: 0}
        configFingerprint: {type: string}
        testToken: {type: string, writeOnly: true, description: Single-purpose opaque token}
        expiresAt: {type: string, format: date-time}
    CreateDataSourceRequest:
      type: object
      required: [name, type, ownerId, config, credential, testToken]
      properties:
        name: {type: string, minLength: 1, maxLength: 160}
        description: {type: string, maxLength: 1000}
        type: {$ref: '#/components/schemas/DataSourceType'}
        ownerId: {type: string, maxLength: 160}
        ownerName: {type: string, maxLength: 240}
        tags: {type: array, maxItems: 20, items: {type: string, maxLength: 40}}
        config: {$ref: '#/components/schemas/ConnectionConfig'}
        credential: {$ref: '#/components/schemas/CredentialInput'}
        testToken: {type: string}
    CredentialInput:
      type: object
      required: [mode]
      properties:
        mode: {type: string, enum: [MANAGED, EXISTING, FILE]}
        name: {type: string, maxLength: 160}
        existingSecretRef: {type: string, format: uuid}
        fileRefs: {type: object, additionalProperties: {type: string, pattern: '^file://[A-Za-z0-9_.-]+$'}}
        values: {type: object, writeOnly: true, additionalProperties: {type: string, maxLength: 8192}}
    CredentialSummary:
      type: object
      required: [id, name, provider, credentialType, status, referenceCount]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        provider: {type: string, enum: [MANAGED, FILE]}
        credentialType: {type: string}
        status: {type: string, enum: [CONFIGURED, EXPIRING, REVOKED]}
        referenceCount: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        rotatedAt: {type: string, format: date-time}
    DataSource:
      type: object
      required: [id, name, type, ownerId, ownerName, config, status, syncStatus, assetCount, version, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        type: {$ref: '#/components/schemas/DataSourceType'}
        ownerId: {type: string}
        ownerName: {type: string}
        tags: {type: array, items: {type: string}}
        config: {$ref: '#/components/schemas/ConnectionConfig'}
        credential: {$ref: '#/components/schemas/CredentialSummary'}
        status: {$ref: '#/components/schemas/ConnectionStatus'}
        syncStatus: {type: string, enum: [NO_TASKS, IDLE, RUNNING, STREAMING, PARTIAL_FAILURE, ALL_FAILURE]}
        assetCount: {type: integer, minimum: 0}
        lastCheckedAt: {type: string, format: date-time}
        lastError: {$ref: '#/components/schemas/Diagnostic'}
        version: {type: integer, format: int64, minimum: 1}
        pipelineReferenceCount: {type: integer, minimum: 0}
        activeRunCount: {type: integer, minimum: 0}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    DataSourceAsset:
      type: object
      required: [id, name, fullPath, assetType, status, schemaStatus, fieldCount, permissionStatus, discoveredAt, fields]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        fullPath: {type: string}
        parentPath: {type: string}
        assetType: {type: string, enum: [BUCKET, PREFIX, FILE, DATABASE, SCHEMA, TABLE, VIEW, CLUSTER, TOPIC]}
        status: {type: string, enum: [AVAILABLE, NEW, UNAVAILABLE]}
        schemaStatus: {type: string, enum: [UNKNOWN, READY, CHANGED, ERROR]}
        schemaHash: {type: string}
        schemaVersion: {type: integer, minimum: 0}
        fieldCount: {type: integer, minimum: 0}
        sizeBytes: {type: integer, format: int64, minimum: 0}
        estimatedRows: {type: integer, format: int64, minimum: 0}
        partitionCount: {type: integer, minimum: 0}
        permissionStatus: {type: string, enum: [READABLE, METADATA_ONLY, DENIED]}
        usedByPipeline: {type: boolean}
        discoveredAt: {type: string, format: date-time}
        fields: {type: array, items: {$ref: '#/components/schemas/AssetField'}}
    DataSourceOverview:
      type: object
      required: [connection, health, assetSummary, pipelineSummary, recentRuns, recentActivity, sectionErrors]
      properties:
        connection: {$ref: '#/components/schemas/DataSource'}
        health: {type: array, items: {$ref: '#/components/schemas/TestStage'}}
        assetSummary: {type: object, additionalProperties: {type: integer}}
        pipelineSummary: {type: object, additionalProperties: {type: integer}}
        recentRuns: {type: array, items: {$ref: '#/components/schemas/PipelineRunSummary'}}
        recentActivity: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
        sectionErrors: {type: object, additionalProperties: {$ref: '#/components/schemas/Diagnostic'}}
    DataSourcePage:
      type: object
      required: [items, page, size, total, counts, filters]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/DataSource'}}
        page: {type: integer, minimum: 0}
        size: {type: integer, minimum: 1}
        total: {type: integer, format: int64, minimum: 0}
        counts: {type: object, additionalProperties: {type: integer}}
        filters: {type: object, additionalProperties: true}
    DataSourceType:
      type: string
      enum: [S3_CSV, MYSQL, POSTGRESQL, KAFKA, EXTERNAL_PULSAR]
    Diagnostic:
      type: object
      required: [stage, occurredAt, reason, requestId, suggestion]
      properties:
        stage: {type: string}
        occurredAt: {type: string, format: date-time}
        reason: {type: string}
        requestId: {type: string, format: uuid}
        suggestion: {type: string}
        technicalDetail: {type: string}
    DiscoveryRun:
      type: object
      required: [taskId, status, discoveredCount, startedAt]
      properties:
        taskId: {type: string, format: uuid}
        status: {type: string, enum: [RUNNING, SUCCEEDED, PARTIAL, FAILED]}
        discoveredCount: {type: integer, minimum: 0}
        startedAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        diagnostic: {$ref: '#/components/schemas/Diagnostic'}
    CreatePipelineRequest:
      type: object
      required: [name, template, mode, dataSourceId, sourceAssetId]
      properties:
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 1000}
        template: {type: string, enum: [BLANK, DATABASE_BATCH, FILE_BATCH, KAFKA_STREAM, OBJECT_RELATION, PULSAR_STREAM]}
        mode: {$ref: '#/components/schemas/PipelineMode'}
        dataSourceId: {type: string, format: uuid}
        sourceAssetId: {type: string, format: uuid}
        ownerId: {type: string, maxLength: 160}
        ownerName: {type: string, maxLength: 240}
    OffsetResetRequest:
      type: object
      required: [position, acknowledgeDuplicateOrLossRisk]
      properties:
        position: {type: string, enum: [EARLIEST, LATEST, SPECIFIC_OFFSETS, TIMESTAMP]}
        timestamp: {type: string, format: date-time}
        specificOffsets: {type: object, additionalProperties: {type: integer, format: int64, minimum: 0}}
        acknowledgeDuplicateOrLossRisk: {type: boolean, const: true}
    Pipeline:
      type: object
      required: [id, name, template, mode, lifecycle, runStatus, dataSourceId, dataSourceName, sourceAssetId, sourceAssetName, targetSummary, scheduleSummary, ownerId, ownerName, version, createdAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        template: {type: string}
        mode: {$ref: '#/components/schemas/PipelineMode'}
        lifecycle: {$ref: '#/components/schemas/PipelineLifecycle'}
        runStatus: {$ref: '#/components/schemas/PipelineRunStatus'}
        dataSourceId: {type: string, format: uuid}
        dataSourceName: {type: string}
        sourceAssetId: {type: string, format: uuid}
        sourceAssetName: {type: string}
        targetSummary: {type: string}
        scheduleSummary: {type: string}
        ownerId: {type: string}
        ownerName: {type: string}
        publishedVersion: {type: integer, minimum: 1}
        version: {type: integer, format: int64, minimum: 1}
        lastRunAt: {type: string, format: date-time}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        draft: {$ref: '#/components/schemas/PipelineDraft'}
    PipelineDecisionRequest:
      type: object
      properties:
        comment: {type: string, maxLength: 1000}
    PipelineDraft:
      type: object
      required: [graph, runtime, schedule, etag, updatedBy, updatedAt]
      properties:
        graph: {$ref: '#/components/schemas/PipelineGraph'}
        runtime: {$ref: '#/components/schemas/PipelineRuntime'}
        schedule: {$ref: '#/components/schemas/PipelineSchedule'}
        baseVersion: {type: integer, minimum: 1}
        etag: {type: integer, format: int64, minimum: 1}
        updatedBy: {type: string}
        updatedAt: {type: string, format: date-time}
    PipelineEdge:
      type: object
      required: [id, source, target]
      properties:
        id: {type: string, maxLength: 160}
        source: {type: string, maxLength: 160}
        target: {type: string, maxLength: 160}
    PipelineFieldSchema:
      type: object
      required: [name, type, nullable, sensitive, sourceNodeId]
      properties:
        name: {type: string}
        type: {type: string}
        nullable: {type: boolean}
        sensitive: {type: boolean}
        sourceNodeId: {type: string}
    PipelineGraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes: {type: array, maxItems: 500, items: {$ref: '#/components/schemas/PipelineNode'}}
        edges: {type: array, maxItems: 1000, items: {$ref: '#/components/schemas/PipelineEdge'}}
    PipelineLifecycle:
      type: string
      enum: [DRAFT, IN_REVIEW, PUBLISHED, PAUSED, ARCHIVED]
    PipelineMode:
      type: string
      enum: [BATCH, STREAMING]
    PipelineNode:
      type: object
      required: [id, type, name, position, config, inputSchema, outputSchema, invalidReasons]
      properties:
        id: {type: string, maxLength: 160}
        type: {type: string, enum: [SOURCE, SELECT, CAST, FILTER, DERIVE, DEDUPLICATE, JOIN, WINDOW, AGGREGATE, QUALITY, ONTOLOGY_OBJECT, ONTOLOGY_RELATION]}
        name: {type: string, maxLength: 240}
        position:
          type: object
          required: [x, y]
          properties: {x: {type: number}, y: {type: number}}
        config: {type: object, additionalProperties: true, description: 'Typed per node; arbitrary code, SQL and UDFs are rejected.'}
        inputSchema: {type: array, items: {$ref: '#/components/schemas/PipelineFieldSchema'}}
        outputSchema: {type: array, items: {$ref: '#/components/schemas/PipelineFieldSchema'}}
        invalidReasons: {type: array, items: {type: string}}
    PipelineNodeType:
      type: object
      required: [type, label, category, modes, minInputs, maxInputs, source, output, description]
      properties:
        type: {type: string}
        label: {type: string}
        category: {type: string}
        modes: {type: array, items: {$ref: '#/components/schemas/PipelineMode'}}
        minInputs: {type: integer, minimum: 0}
        maxInputs: {type: integer, minimum: 0}
        source: {type: boolean}
        output: {type: boolean}
        description: {type: string}
    PipelinePage:
      type: object
      required: [items, page, size, total, counts, appliedFilters]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/Pipeline'}}
        page: {type: integer, minimum: 0}
        size: {type: integer, minimum: 1}
        total: {type: integer, format: int64, minimum: 0}
        counts: {type: object, additionalProperties: {type: integer}}
        appliedFilters: {type: object, additionalProperties: {type: string}}
    PipelinePreview:
      type: object
      required: [id, pipelineId, draftEtag, nodeId, status, rows, schema, startedAt, expiresAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        draftEtag: {type: integer, format: int64}
        nodeId: {type: string}
        status: {type: string, enum: [SUBMITTED, RUNNING, COMPLETED, FAILED, CANCELLED, EXPIRED]}
        flinkJobId: {type: string}
        rows: {type: array, maxItems: 100, items: {type: object, additionalProperties: true}}
        schema: {type: array, items: {$ref: '#/components/schemas/PipelineFieldSchema'}}
        diagnostic: {type: object, additionalProperties: true}
        startedAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
    PipelinePreviewRequest:
      type: object
      required: [nodeId]
      properties:
        nodeId: {type: string, maxLength: 160}
        limit: {type: integer, minimum: 1, maximum: 100, default: 100}
    PipelineProposal:
      type: object
      required: [id, pipelineId, draftEtag, status, riskLevel, title, validation, impact, submittedBy, submittedByName, submittedAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        draftEtag: {type: integer, format: int64}
        status: {type: string, enum: [OPEN, APPROVED, REJECTED, SUPERSEDED]}
        riskLevel: {type: string, enum: [NORMAL, HIGH]}
        title: {type: string}
        summary: {type: string}
        validation: {type: array, items: {$ref: '#/components/schemas/PipelineValidationIssue'}}
        impact: {type: object, additionalProperties: true}
        submittedBy: {type: string}
        submittedByName: {type: string}
        submittedAt: {type: string, format: date-time}
        decidedByName: {type: string}
        decidedAt: {type: string, format: date-time}
        decisionComment: {type: string}
    PipelineProposalRequest:
      type: object
      required: [title]
      properties:
        title: {type: string, minLength: 1, maxLength: 240}
        summary: {type: string, maxLength: 1000}
    PipelineRun:
      type: object
      required: [id, pipelineId, pipelineName, pipelineVersionId, pipelineVersion, triggerType, status, correlationId, readCount, writtenCount, rejectedCount, requestedByName, startedAt, updatedAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        pipelineName: {type: string}
        pipelineVersionId: {type: string, format: uuid}
        pipelineVersion: {type: integer, minimum: 1}
        retryOf: {type: string, format: uuid}
        triggerType: {type: string}
        status: {type: string}
        flinkJobId: {type: string}
        correlationId: {type: string}
        readCount: {type: integer, format: int64, minimum: 0}
        writtenCount: {type: integer, format: int64, minimum: 0}
        rejectedCount: {type: integer, format: int64, minimum: 0}
        projectionStatus: {type: string}
        savepointPath: {type: string}
        diagnostic: {type: object, additionalProperties: true}
        requestedByName: {type: string}
        startedAt: {type: string, format: date-time}
        completedAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    PipelineRunDetail:
      type: object
      required: [run, stages, events, metrics, logs]
      properties:
        run: {$ref: '#/components/schemas/PipelineRun'}
        stages: {type: array, items: {type: object, additionalProperties: true}}
        events: {type: array, items: {$ref: '#/components/schemas/PipelineRunEvent'}}
        metrics: {type: object, additionalProperties: true}
        logs: {type: array, items: {type: object, additionalProperties: true}}
    PipelineRunEvent:
      type: object
      required: [sequence, eventType, message, safeDetails, occurredAt]
      properties:
        sequence: {type: integer, format: int64, minimum: 1}
        eventType: {type: string}
        status: {type: string}
        message: {type: string}
        safeDetails: {type: object, additionalProperties: true}
        occurredAt: {type: string, format: date-time}
    PipelineRunPage:
      type: object
      required: [items, page, size, total]
      properties:
        items: {type: array, items: {$ref: '#/components/schemas/PipelineRun'}}
        page: {type: integer, minimum: 0}
        size: {type: integer, minimum: 1}
        total: {type: integer, format: int64, minimum: 0}
    PipelineRunStatus:
      type: string
      enum: [NEVER_RUN, HEALTHY, RUNNING, LIVE, DEGRADED, FAILED]
    PipelineRunSummary:
      type: object
      required: [id, pipelineName, sourceAsset, triggerType, status, startedAt, readCount, writtenCount, rejectedCount]
      properties:
        id: {type: string, format: uuid}
        pipelineName: {type: string}
        sourceAsset: {type: string}
        triggerType: {type: string}
        status: {type: string}
        startedAt: {type: string, format: date-time}
        durationMs: {type: integer, format: int64}
        readCount: {type: integer, format: int64}
        writtenCount: {type: integer, format: int64}
        rejectedCount: {type: integer, format: int64}
        flinkJobId: {type: string}
    PipelineSummary:
      type: object
      required: [id, name, mode, status, ownerName]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        sourceAsset: {type: string}
        mode: {type: string, enum: [BATCH, STREAMING]}
        status: {type: string}
        ownerName: {type: string}
        recentRunAt: {type: string, format: date-time}
    PipelineRuntime:
      type: object
      required: [parallelism, checkpointIntervalMs, restartAttempts, offsetPolicy, watermarkDelayMs]
      properties:
        parallelism: {type: integer, minimum: 1, maximum: 4}
        checkpointIntervalMs: {type: integer, format: int64, minimum: 0}
        restartAttempts: {type: integer, minimum: 0, maximum: 10}
        offsetPolicy: {type: string}
        eventTimeField: {type: string}
        watermarkDelayMs: {type: integer, format: int64, minimum: 0}
    PipelineSchedule:
      type: object
      required: [type, concurrencyPolicy, enabled]
      properties:
        type: {type: string, enum: [MANUAL, CRON, AT]}
        cronExpression: {type: string}
        runAt: {type: string, format: date-time}
        concurrencyPolicy: {type: string, enum: [SKIP, QUEUE, CANCEL_PREVIOUS]}
        enabled: {type: boolean}
    PipelineValidation:
      type: object
      required: [valid, issues, normalizedGraph, impact, contentHash]
      properties:
        valid: {type: boolean}
        issues: {type: array, items: {$ref: '#/components/schemas/PipelineValidationIssue'}}
        normalizedGraph: {$ref: '#/components/schemas/PipelineGraph'}
        impact: {type: object, additionalProperties: true}
        contentHash: {type: string, pattern: '^[0-9a-f]{64}$'}
    PipelineValidationIssue:
      type: object
      required: [id, category, severity, title, detail, recoveryAction]
      properties:
        id: {type: string}
        category: {type: string, enum: [GRAPH, SCHEMA, SOURCE, OUTPUT, SEMANTICS, RUNTIME, SECURITY]}
        severity: {type: string, enum: [ERROR, WARNING, INFO]}
        nodeId: {type: string}
        title: {type: string}
        detail: {type: string}
        recoveryAction: {type: string}
    PipelineVersion:
      type: object
      required: [id, pipelineId, version, graph, pipelineIr, jobSpec, contentHash, validation, publishedBy, publishedByName, publishedAt]
      properties:
        id: {type: string, format: uuid}
        pipelineId: {type: string, format: uuid}
        version: {type: integer, minimum: 1}
        graph: {$ref: '#/components/schemas/PipelineGraph'}
        pipelineIr: {type: object, additionalProperties: true, description: Secret-free ontology.pipeline/v1 IR.}
        jobSpec: {type: object, additionalProperties: true, description: Signed platform Flink JAR specification.}
        contentHash: {type: string}
        validation: {type: array, items: {$ref: '#/components/schemas/PipelineValidationIssue'}}
        publishedBy: {type: string}
        publishedByName: {type: string}
        publishedAt: {type: string, format: date-time}
    PublishPipelineRequest:
      type: object
      required: [acknowledgeWarnings, startAfterPublish]
      properties:
        acknowledgeWarnings: {type: boolean}
        startAfterPublish: {type: boolean}
        proposalId: {type: string, format: uuid}
    RollbackPipelineRequest:
      type: object
      required: [version, acknowledgeDataNotReverted]
      properties:
        version: {type: integer, minimum: 1}
        acknowledgeDataNotReverted: {type: boolean, const: true}
    UpdatePipelineDraftRequest:
      type: object
      properties:
        graph: {$ref: '#/components/schemas/PipelineGraph'}
        runtime: {$ref: '#/components/schemas/PipelineRuntime'}
        schedule: {$ref: '#/components/schemas/PipelineSchedule'}
        name: {type: string, minLength: 1, maxLength: 240}
        description: {type: string, maxLength: 1000}
    Problem:
      type: object
      required: [type, title, status, detail, requestId]
      properties:
        type: {type: string, format: uri-reference}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        requestId: {type: string}
    RotateCredentialRequest:
      type: object
      required: [credential]
      properties:
        credential: {$ref: '#/components/schemas/CredentialInput'}
    TestDataSourceRequest:
      type: object
      required: [type, config, credential]
      properties:
        type: {$ref: '#/components/schemas/DataSourceType'}
        config: {$ref: '#/components/schemas/ConnectionConfig'}
        credential: {$ref: '#/components/schemas/CredentialInput'}
    TestStage:
      type: object
      required: [stage, status, message]
      properties:
        stage: {type: string, enum: [NETWORK, TLS, AUTHENTICATION, METADATA, DISCOVERY]}
        status: {type: string, enum: [PENDING, RUNNING, PASSED, WARNING, FAILED]}
