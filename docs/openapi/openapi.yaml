        publishedBy: {type: string}
        publishedAt: {type: string, format: date-time}
    DashboardRunRequest:
      type: object
      additionalProperties: false
      properties:
        versionId: {type: string, format: uuid}
        filters: {$ref: '#/components/schemas/PropertyValueMap'}
        widgetIds: {type: array, items: {type: string}}
    DashboardRun:
      type: object
      additionalProperties: false
      required: [id, dashboardVersionId, status, widgets, queriedAt, traceId]
      properties:
        id: {type: string, format: uuid}
        dashboardVersionId: {type: string, format: uuid}
        status: {$ref: '#/components/schemas/RunStatus'}
        widgets: {type: array, items: {$ref: '#/components/schemas/DashboardWidgetResult'}}
