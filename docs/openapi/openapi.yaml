openapi: 3.1.0
info:
  title: Ontology Platform API
  version: 1.0.0
  description: |
    Public contract for the Ontology Platform. Ontology is the only resource,
    authorization, versioning, and routing scope. All caller-visible resources
    are addressed below /v1/ontologies/{ontologyId}.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /api
    description: APISIX product gateway
security:
  - bearerAuth: []
tags:
  - name: Ontologies
    description: Ontology identity, metadata, membership scope, and lifecycle.
  - name: Connections
    description: Managed external data connections and discovered source assets.
  - name: Pipelines
    description: Versioned data transformation DAGs, previews, and runs.
  - name: Datasets
    description: Immutable dataset versions, previews, queries, and ontology mappings.
  - name: Ontology modeling
    description: Object types, link types, interfaces, actions, functions, proposals, and revisions.
  - name: Objects
    description: Permission-scoped objects, object sets, links, activity, and provenance.
  - name: Actions and functions
    description: Governed read-only function execution and previewed business mutations.
  - name: Dashboards
    description: Versioned analytical applications and caller-scoped execution.
  - name: Agents
    description: Ontology-bound agents, caller-owned conversations, and confirmed actions.
  - name: Operations
    description: Ontology-scoped health and audit evidence.
paths:
  /v1/ontologies:
    get:
      tags: [Ontologies]
      operationId: listOntologies
      summary: List Ontologies visible to the caller
      responses:
        '200':
          description: Visible Ontologies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologySummary'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Ontologies]
      operationId: createOntology
      summary: Create an Ontology
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOntologyRequest'
      responses:
        '201':
          description: Created Ontology
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ontology'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    get:
      tags: [Ontologies]
      operationId: getOntology
      summary: Get an Ontology
      responses:
        '200':
          description: Ontology
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ontology'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Ontologies]
      operationId: updateOntology
      summary: Update Ontology metadata
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOntologyRequest'
      responses:
        '200':
          description: Updated Ontology
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ontology'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connection-tests:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    post:
      tags: [Connections]
      operationId: testConnectionConfiguration
      summary: Test transient connection configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectionTestRequest'
      responses:
        '200':
          description: Test result and caller-bound token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connections:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    get:
      tags: [Connections]
      operationId: listConnections
      summary: List data connections
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ConnectionStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/ConnectionType'
      responses:
        '200':
          description: Connection page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionPage'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Connections]
      operationId: createConnection
      summary: Create a tested connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectionRequest'
      responses:
        '201':
          description: Created connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connections/{connectionId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/ConnectionId'
    get:
      tags: [Connections]
      operationId: getConnection
      summary: Get a connection
      responses:
        '200':
          description: Connection
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Connections]
      operationId: updateConnection
      summary: Update connection metadata or configuration
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConnectionRequest'
      responses:
        '200':
          description: Updated connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Connections]
      operationId: deleteConnection
      summary: Delete an unused connection
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connections/{connectionId}/test:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/ConnectionId'
    post:
      tags: [Connections]
      operationId: retestConnection
      summary: Test the persisted connection
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connections/{connectionId}/assets:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/ConnectionId'
    get:
      tags: [Connections]
      operationId: listSourceAssets
      summary: List discovered source assets
      responses:
        '200':
          description: Source assets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SourceAsset'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Connections]
      operationId: discoverSourceAssets
      summary: Start source asset discovery
      responses:
        '202':
          description: Discovery operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/connections/{connectionId}/assets/{assetId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/ConnectionId'
      - $ref: '#/components/parameters/AssetId'
    get:
      tags: [Connections]
      operationId: getSourceAsset
      summary: Get source asset schema and samples
      responses:
        '200':
          description: Source asset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceAssetDetail'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    get:
      tags: [Pipelines]
      operationId: listPipelines
      summary: List pipelines
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
      responses:
        '200':
          description: Pipeline page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelinePage'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Pipelines]
      operationId: createPipeline
      summary: Create a pipeline and initial draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePipelineRequest'
      responses:
        '201':
          description: Created pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    get:
      tags: [Pipelines]
      operationId: getPipeline
      summary: Get a pipeline
      responses:
        '200':
          description: Pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    patch:
      tags: [Pipelines]
      operationId: updatePipeline
      summary: Update pipeline metadata
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePipelineRequest'
      responses:
        '200':
          description: Updated pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}/draft:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    get:
      tags: [Pipelines]
      operationId: getPipelineDraft
      summary: Get the editable pipeline draft
      responses:
        '200':
          description: Pipeline draft
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDraft'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      tags: [Pipelines]
      operationId: replacePipelineDraft
      summary: Replace and normalize the pipeline draft graph
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplacePipelineDraftRequest'
      responses:
        '200':
          description: Normalized draft
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDraft'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}/validate:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    post:
      tags: [Pipelines]
      operationId: validatePipelineDraft
      summary: Validate graph, schema, runtime, outputs, and security
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineValidation'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}/previews:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    post:
      tags: [Pipelines]
      operationId: createPipelinePreview
      summary: Run a bounded preview through the Flink runtime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePipelinePreviewRequest'
      responses:
        '202':
          description: Preview run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelinePreview'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}/versions:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    get:
      tags: [Pipelines]
      operationId: listPipelineVersions
      summary: List immutable pipeline versions
      responses:
        '200':
          description: Pipeline versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PipelineVersion'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Pipelines]
      operationId: publishPipelineDraft
      summary: Publish the validated draft as an immutable version
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishRequest'
      responses:
        '201':
          description: Published pipeline version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineVersion'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipelines/{pipelineId}/runs:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/PipelineId'
    get:
      tags: [Pipelines]
      operationId: listPipelineRuns
      summary: List pipeline runs
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Pipeline run page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRunPage'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Pipelines]
      operationId: createPipelineRun
      summary: Run a published batch pipeline or start a stream
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePipelineRunRequest'
      responses:
        '202':
          description: Submitted pipeline run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRun'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/pipeline-runs/{runId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/RunId'
    get:
      tags: [Pipelines]
      operationId: getPipelineRun
      summary: Get pipeline run status, stages, metrics, and safe logs
      responses:
        '200':
          description: Pipeline run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRunDetail'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Pipelines]
      operationId: cancelPipelineRun
      summary: Cancel a running pipeline
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineRun'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    get:
      tags: [Datasets]
      operationId: listDatasets
      summary: List datasets
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
      responses:
        '200':
          description: Dataset page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPage'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets/{datasetId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/DatasetId'
    get:
      tags: [Datasets]
      operationId: getDataset
      summary: Get dataset metadata and current version
      responses:
        '200':
          description: Dataset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Datasets]
      operationId: deleteDataset
      summary: Delete an unreferenced dataset
      responses:
        '204':
          description: Deleted
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets/{datasetId}/versions:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/DatasetId'
    get:
      tags: [Datasets]
      operationId: listDatasetVersions
      summary: List immutable dataset versions
      responses:
        '200':
          description: Dataset versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetVersion'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets/{datasetId}/preview:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/DatasetId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
    get:
      tags: [Datasets]
      operationId: previewDataset
      summary: Preview a dataset version
      parameters:
        - name: versionId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dataset preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetPreview'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets/{datasetId}/query:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/DatasetId'
    post:
      tags: [Datasets]
      operationId: queryDataset
      summary: Filter and aggregate a dataset version
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetQueryRequest'
      responses:
        '200':
          description: Dataset query result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetQueryResult'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/datasets/{datasetId}/mappings:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/DatasetId'
    get:
      tags: [Datasets]
      operationId: listOntologyMappings
      summary: List mappings sourced from a dataset
      responses:
        '200':
          description: Ontology mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OntologyMapping'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Datasets]
      operationId: createOntologyMapping
      summary: Preview and create an object or link mapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOntologyMappingRequest'
      responses:
        '201':
          description: Created mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OntologyMapping'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/object-types:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
    get:
      tags: [Ontology modeling]
      operationId: listObjectTypes
      summary: List object types
      responses:
        '200':
          description: Object types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ObjectType'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Ontology modeling]
      operationId: createObjectTypeDraft
      summary: Create an object type draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectTypeDraft'
      responses:
        '201':
          description: Created object type draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectType'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/ontologies/{ontologyId}/object-types/{objectTypeId}:
    parameters:
      - $ref: '#/components/parameters/OntologyId'
      - $ref: '#/components/parameters/ObjectTypeId'
    get:
      tags: [Ontology modeling]
      operationId: getObjectType
      summary: Get an object type
      responses:
        '200':
          description: Object type
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectType'
        '400':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
    put:
      tags: [Ontology modeling]
      operationId: replaceObjectTypeDraft
      summary: Replace the latest object type draft
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectTypeDraft'
      responses:
        '200':
          description: Updated object type draft
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectType'
        '400':
          $ref: '#/components/responses/Problem'
