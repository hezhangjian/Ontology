name: ontology-platform

x-flink-build: &flink-build
  context: ..
  dockerfile: backend/flink-job/Dockerfile
  args:
    FLINK_BASE_IMAGE: ${FLINK_BASE_IMAGE}
    FLINK_CONNECTOR_JDBC_SHA256: ${FLINK_CONNECTOR_JDBC_SHA256}
    FLINK_CONNECTOR_JDBC_VERSION: ${FLINK_CONNECTOR_JDBC_VERSION}
    FLINK_CONNECTOR_KAFKA_SHA256: ${FLINK_CONNECTOR_KAFKA_SHA256}
    FLINK_CONNECTOR_KAFKA_VERSION: ${FLINK_CONNECTOR_KAFKA_VERSION}
    FLINK_CONNECTOR_PULSAR_SHA256: ${FLINK_CONNECTOR_PULSAR_SHA256}
    FLINK_CONNECTOR_PULSAR_VERSION: ${FLINK_CONNECTOR_PULSAR_VERSION}
    FLINK_S3_HADOOP_SHA256: ${FLINK_S3_HADOOP_SHA256}
    FLINK_S3_HADOOP_VERSION: ${FLINK_S3_HADOOP_VERSION}
    MYSQL_DRIVER_SHA256: ${MYSQL_DRIVER_SHA256}
    MYSQL_DRIVER_VERSION: ${MYSQL_DRIVER_VERSION}
    POSTGRES_DRIVER_SHA256: ${POSTGRES_DRIVER_SHA256}
    POSTGRES_DRIVER_VERSION: ${POSTGRES_DRIVER_VERSION}

x-flink-common: &flink-common
  image: ${FLINK_IMAGE}
  build: *flink-build
  profiles: [compute]
  depends_on:
    minio-bootstrap:
      condition: service_completed_successfully
  secrets:
    - flink_workload_token
    - minio_root_password
    - minio_root_user
  volumes:
    - ../deploy/config/flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
    - flink-checkpoints-cache:/opt/flink/checkpoints-cache
  restart: unless-stopped

x-java-build: &java-build
  context: ..
  dockerfile: backend/Dockerfile

x-java-common: &java-common
  environment:
    SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
  restart: unless-stopped

x-app-java-build: &app-java-build
  context: ..
  dockerfile: backend/Dockerfile

services:
  apisix:
    image: ${APISIX_IMAGE}
    profiles: [gateway]
    depends_on:
      frontend:
        condition: service_healthy
        restart: true
      ontology-core:
        condition: service_healthy
        restart: true
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:9080:9080
    volumes:
      - ../deploy/config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ../deploy/config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    healthcheck:
      test: [CMD, bash, -ec, "exec 3<>/dev/tcp/127.0.0.1/9080; printf 'GET /healthz HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: ${POSTGRES_IMAGE}
    profiles: [core]
    environment:
      POSTGRES_DB: ontology
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: ontology
    secrets:
      - postgres_password
    volumes:
      - postgres17-data:/var/lib/postgresql/data
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:5432:5432
    healthcheck:
      test: [CMD-SHELL, pg_isready -U ontology -d ontology]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    profiles: [core, maintenance]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
    secrets:
      - minio_root_password
      - minio_root_user
    volumes:
      - minio-data:/data
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:9000:9000
      - ${BIND_ADDRESS:-0.0.0.0}:9001:9001
    healthcheck:
      test: [CMD, curl, -fsS, http://localhost:9000/minio/health/live]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio-bootstrap:
    image: ${MINIO_MC_IMAGE}
    profiles: [core, maintenance]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [/bin/sh, /bootstrap/bootstrap-storage.sh]
    environment:
      MINIO_ENDPOINT: http://minio:9000
    secrets:
      - minio_root_password
      - minio_root_user
    volumes:
      - ../deploy/scripts:/bootstrap:ro
    restart: "no"

  pulsar:
    image: ${PULSAR_IMAGE}
    profiles: [core]
    command:
      - /bin/bash
      - -ec
      - |
        bin/apply-config-from-env.py conf/standalone.conf
        exec bin/pulsar standalone
    environment:
      PULSAR_MEM: -Xms384m -Xmx384m -XX:MaxDirectMemorySize=256m
      PULSAR_PREFIX_allowAutoTopicCreation: "false"
      PULSAR_PREFIX_brokerDeleteInactiveTopicsEnabled: "false"
      PULSAR_PREFIX_transactionCoordinatorEnabled: "true"
    volumes:
      - pulsar-conf:/pulsar/conf
      - pulsar-data:/pulsar/data
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:6650:6650
      - ${BIND_ADDRESS:-0.0.0.0}:8080:8080
    healthcheck:
      test: [CMD, bin/pulsar-admin, brokers, healthcheck]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  pulsar-bootstrap:
    image: ${PULSAR_IMAGE}
    profiles: [core]
    depends_on:
      pulsar:
        condition: service_healthy
    command: [/bin/bash, /bootstrap/bootstrap-pulsar.sh]
    environment:
      PULSAR_ADMIN_URL: http://pulsar:8080
    volumes:
      - ../deploy/scripts:/bootstrap:ro
    restart: "no"

  flink-jobmanager:
    <<: *flink-common
    command: jobmanager
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:8081:8081
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8081/overview >/dev/null]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  flink-taskmanager:
    <<: *flink-common
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: [CMD-SHELL, test -n "$$(curl -fsS http://flink-jobmanager:8081/taskmanagers | grep taskmanagers)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  hugegraph:
    image: ${HUGEGRAPH_IMAGE}
    profiles: [core]
    environment:
      JAVA_OPTS: -Xms256m -Xmx512m
      PRELOAD: "false"
    volumes:
      - ../deploy/scripts/start-hugegraph.sh:/opt/platform/start-hugegraph.sh:ro
      - hugegraph-data:/hugegraph/hugegraph-server/hugegraph-dist
    command: [/bin/bash, /opt/platform/start-hugegraph.sh]
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:8088:8080
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8080/versions >/dev/null]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  opensearch:
    image: ${OPENSEARCH_IMAGE}
    profiles: [core, observability]
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms384m -Xmx384m -XX:MaxDirectMemorySize=192m
      discovery.type: single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:9200:9200
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow >/dev/null]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  ontology-core:
    <<: *java-common
    image: ${ONTOLOGY_CORE_IMAGE}
    profiles: [core]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: ontology-core
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: ontology-core
    secrets:
      - connection_master_key
      - flink_workload_token
      - minio_root_password
      - minio_root_user
      - postgres_password
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8000/actuator/health/readiness | grep -q '"status":"UP"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  projection-worker:
    <<: *java-common
    image: ${PROJECTION_WORKER_IMAGE}
    profiles: [core]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: projection-worker
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      hugegraph:
        condition: service_healthy
      ontology-core:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      pulsar-bootstrap:
        condition: service_completed_successfully
    environment:
      SPRING_CONFIG_IMPORT: configtree:/run/secrets/
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: projection-worker
    secrets:
      - postgres_password

  maintenance-runner:
    <<: *java-common
    image: ${MAINTENANCE_RUNNER_IMAGE}
    profiles: [maintenance]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: maintenance-runner
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: maintenance-runner

  agent-runtime:
    image: ${AGENT_RUNTIME_IMAGE}
    profiles: [apps]
    build:
      <<: *app-java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: agent-runtime
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      ontology-core:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: agent-runtime
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8002/actuator/health/readiness | grep -q '"status":"UP"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  bff:
    image: ${BFF_IMAGE}
    profiles: [apps]
    build:
      <<: *app-java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: bff
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      ontology-core:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: bff
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8001/actuator/health/readiness | grep -q '"status":"UP"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  frontend:
    image: ${WEB_IMAGE}
    profiles: [apps]
    build:
      context: ..
      dockerfile: portal/Dockerfile
      args:
        NGINX_IMAGE: ${NGINX_IMAGE}
        NODE_IMAGE: ${NODE_IMAGE}
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:3000:80
    healthcheck:
      test: [CMD-SHELL, wget -qO- http://127.0.0.1/healthz | grep -q ok]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  skywalking-oap:
    image: ${SKYWALKING_OAP_IMAGE}
    profiles: [observability]
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      JAVA_OPTS: -Xms256m -Xmx384m
      SW_CORE_RECORD_DATA_TTL: "7"
      SW_CORE_METRICS_DATA_TTL: "7"
      SW_NAMESPACE: skywalking
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: opensearch:9200
      SW_TELEMETRY: prometheus
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:11800:11800
      - ${BIND_ADDRESS:-0.0.0.0}:12800:12800
    healthcheck:
      test: [CMD, bash, -ec, "exec 3<>/dev/tcp/127.0.0.1/12800; printf 'GET /healthcheck HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  skywalking-ui:
    image: ${SKYWALKING_UI_IMAGE}
    profiles: [observability]
    depends_on:
      skywalking-oap:
        condition: service_healthy
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - ${BIND_ADDRESS:-0.0.0.0}:8082:8080
    healthcheck:
      test: [CMD, bash, -ec, "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET / HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    profiles: [observability]
    command: [--config=/etc/otelcol-contrib/config.yaml]
    depends_on:
      skywalking-oap:
        condition: service_healthy
    volumes:
      - ../deploy/config/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    healthcheck:
      test: [CMD, /otelcol-contrib, components]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

networks:
  default:
    name: ontology-platform

secrets:
  connection_master_key:
    file: ${SECRET_DIR:-../deploy/secrets/examples}/connection_master_key
  flink_workload_token:
    file: ${SECRET_DIR:-../deploy/secrets/examples}/flink_workload_token
  minio_root_password:
    file: ${SECRET_DIR:-../deploy/secrets/examples}/minio_root_password
  minio_root_user:
    file: ${SECRET_DIR:-../deploy/secrets/examples}/minio_root_user
  postgres_password:
    file: ${SECRET_DIR:-../deploy/secrets/examples}/postgres_password

volumes:
  flink-checkpoints-cache:
  hugegraph-data:
  minio-data:
  opensearch-data:
  postgres17-data:
  pulsar-conf:
  pulsar-data:
