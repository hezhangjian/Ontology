name: ontology-platform

include:
  - compose/05-gateway.yml
  - compose/10-control-store.yml
  - compose/15-object-storage.yml
  - compose/20-event-bus.yml
  - compose/30-compute.yml
  - compose/40-ontology-storage.yml
  - compose/60-platform.yml
  - compose/70-apps.yml
  - compose/90-observability.yml

networks:
  default:
    name: ontology-platform

secrets:
  connection_master_key:
    file: ${SECRET_DIR:-./secrets/examples}/connection_master_key
  flink_workload_token:
    file: ${SECRET_DIR:-./secrets/examples}/flink_workload_token
  minio_root_password:
    file: ${SECRET_DIR:-./secrets/examples}/minio_root_password
  minio_root_user:
    file: ${SECRET_DIR:-./secrets/examples}/minio_root_user
  postgres_password:
    file: ${SECRET_DIR:-./secrets/examples}/postgres_password

volumes:
  flink-checkpoints-cache:
  hugegraph-data:
  minio-data:
  opensearch-data:
  postgres17-data:
  pulsar-conf:
  pulsar-data:
