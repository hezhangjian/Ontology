name: ontology-platform

include:
  - compose/05-gateway.yml
  - compose/10-control-store.yml
  - compose/15-object-storage.yml
  - compose/20-event-bus.yml
  - compose/30-compute.yml
  - compose/40-ontology-storage.yml
  - compose/50-security.yml
  - compose/60-platform.yml
  - compose/70-apps.yml
  - compose/90-observability.yml

networks:
  default:
    name: ontology-platform

secrets:
  demo_admin_password:
    file: ${SECRET_DIR:-./secrets/examples}/demo_admin_password
  demo_builder_password:
    file: ${SECRET_DIR:-./secrets/examples}/demo_builder_password
  demo_viewer_password:
    file: ${SECRET_DIR:-./secrets/examples}/demo_viewer_password
  keycloak_admin_password:
    file: ${SECRET_DIR:-./secrets/examples}/keycloak_admin_password
  minio_root_password:
    file: ${SECRET_DIR:-./secrets/examples}/minio_root_password
  minio_root_user:
    file: ${SECRET_DIR:-./secrets/examples}/minio_root_user
  postgres_password:
    file: ${SECRET_DIR:-./secrets/examples}/postgres_password

volumes:
  flink-checkpoints-cache:
  hugegraph-data:
  keycloak-data:
  minio-data:
  opensearch-data:
  postgres17-data:
  pulsar-conf:
  pulsar-data:
