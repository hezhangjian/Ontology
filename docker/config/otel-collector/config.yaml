receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus:
    config:
      scrape_configs:
        - job_name: apisix
          static_configs:
            - targets: [apisix:9091]
        - job_name: flink
          static_configs:
            - targets: [flink-jobmanager:9249, flink-taskmanager:9249]
        - job_name: pulsar
          metrics_path: /metrics
          static_configs:
            - targets: [pulsar:8080]

processors:
  batch: {}
  memory_limiter:
    check_interval: 1s
    limit_mib: 384

exporters:
  otlp/skywalking:
    endpoint: skywalking-oap:11800
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [otlp/skywalking]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/skywalking]
