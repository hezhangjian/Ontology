routes:
  - id: platform-health
    uri: /healthz
    priority: 100
    plugins:
      serverless-pre-function:
        phase: rewrite
        functions:
          - return function(conf, ctx) ngx.status = 200; ngx.say("ok"); return ngx.exit(200) end

  - id: ontology-api
    uri: /api/ontology/*
    priority: 90
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/ontology/(.*)", "/$1"]
    upstream:
      type: roundrobin
      nodes:
        ontology-core:8000: 1

  - id: bff-api
    uri: /api/bff/*
    priority: 90
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/bff/(.*)", "/$1"]
    upstream:
      type: roundrobin
      nodes:
        bff:8001: 1

  - id: agent-api
    uri: /api/agent/*
    priority: 90
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/agent/(.*)", "/$1"]
    upstream:
      type: roundrobin
      nodes:
        agent-runtime:8002: 1

  - id: observability-ui
    uri: /observability/*
    priority: 80
    plugins:
      proxy-rewrite:
        regex_uri: ["^/observability/(.*)", "/$1"]
    upstream:
      type: roundrobin
      nodes:
        skywalking-ui:8080: 1

  - id: portal
    uri: /*
    priority: 0
    upstream:
      type: roundrobin
      nodes:
        frontend:80: 1

#END
