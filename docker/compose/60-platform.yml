x-java-build: &java-build
  context: ../..
  dockerfile: docker/images/java-service/Dockerfile

x-java-common: &java-common
  environment:
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8083}/realms/ontology
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/ontology/protocol/openid-connect/certs
    SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
  restart: unless-stopped

services:
  ontology-core:
    <<: *java-common
    image: ${ONTOLOGY_CORE_IMAGE}
    profiles: [core]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: ontology-core
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8083}/realms/ontology
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/ontology/protocol/openid-connect/certs
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: ontology-core
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8000/actuator/health/readiness | grep -q '"status":"UP"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  projection-worker:
    <<: *java-common
    image: ${PROJECTION_WORKER_IMAGE}
    profiles: [core]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: projection-worker
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      hugegraph:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      pulsar-bootstrap:
        condition: service_completed_successfully
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: projection-worker

  maintenance-runner:
    <<: *java-common
    image: ${MAINTENANCE_RUNNER_IMAGE}
    profiles: [maintenance]
    build:
      <<: *java-build
      args:
        JAVA_IMAGE: ${JAVA_IMAGE}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        MODULE: maintenance-runner
        SKYWALKING_JAVA_AGENT_SHA512: ${SKYWALKING_JAVA_AGENT_SHA512}
        SKYWALKING_JAVA_AGENT_VERSION: ${SKYWALKING_JAVA_AGENT_VERSION}
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
      SW_AGENT_NAME: maintenance-runner
