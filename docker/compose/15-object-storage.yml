services:
  minio:
    image: ${MINIO_IMAGE}
    profiles: [core, maintenance]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
    secrets:
      - minio_root_password
      - minio_root_user
    volumes:
      - minio-data:/data
    healthcheck:
      test: [CMD, curl, -fsS, http://localhost:9000/minio/health/live]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  minio-bootstrap:
    image: ${MINIO_MC_IMAGE}
    profiles: [core, maintenance]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: [/bin/sh, /bootstrap/bootstrap-storage.sh]
    environment:
      MINIO_ENDPOINT: http://minio:9000
    secrets:
      - minio_root_password
      - minio_root_user
    volumes:
      - ../scripts:/bootstrap:ro
    restart: "no"
