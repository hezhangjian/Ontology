services:
  apisix:
    image: ${APISIX_IMAGE}
    profiles: [gateway]
    depends_on:
      frontend:
        condition: service_healthy
        restart: true
      keycloak:
        condition: service_healthy
        restart: true
      ontology-core:
        condition: service_healthy
        restart: true
    ports:
      - 9080:9080
    volumes:
      - ../config/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ../config/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    healthcheck:
      test: [CMD, bash, -ec, "exec 3<>/dev/tcp/127.0.0.1/9080; printf 'GET /healthz HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
