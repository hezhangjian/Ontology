services:
  hugegraph:
    image: ${HUGEGRAPH_IMAGE}
    profiles: [core]
    environment:
      JAVA_OPTS: -Xms256m -Xmx768m
      PRELOAD: "false"
    volumes:
      - ../scripts/start-hugegraph.sh:/opt/platform/start-hugegraph.sh:ro
      - hugegraph-data:/hugegraph/hugegraph-server/hugegraph-dist
    command: [/bin/bash, /opt/platform/start-hugegraph.sh]
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:8080/versions >/dev/null]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  opensearch:
    image: ${OPENSEARCH_IMAGE}
    profiles: [core, observability]
    environment:
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: -Xms768m -Xmx768m
      discovery.type: single-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: [CMD-SHELL, curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow >/dev/null]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped
