services:
  pulsar:
    image: ${PULSAR_IMAGE}
    profiles: [core]
    command:
      - /bin/bash
      - -ec
      - |
        bin/apply-config-from-env.py conf/standalone.conf
        exec bin/pulsar standalone
    environment:
      PULSAR_MEM: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m
      PULSAR_PREFIX_allowAutoTopicCreation: "false"
      PULSAR_PREFIX_brokerDeleteInactiveTopicsEnabled: "false"
      PULSAR_PREFIX_transactionCoordinatorEnabled: "true"
    volumes:
      - pulsar-conf:/pulsar/conf
      - pulsar-data:/pulsar/data
    healthcheck:
      test: [CMD, bin/pulsar-admin, brokers, healthcheck]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  pulsar-bootstrap:
    image: ${PULSAR_IMAGE}
    profiles: [core]
    depends_on:
      pulsar:
        condition: service_healthy
    command: [/bin/bash, /bootstrap/bootstrap-pulsar.sh]
    environment:
      PULSAR_ADMIN_URL: http://pulsar:8080
    volumes:
      - ../scripts:/bootstrap:ro
    restart: "no"
