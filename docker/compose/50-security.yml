services:
  keycloak:
    image: ${KEYCLOAK_IMAGE}
    profiles: [auth]
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: [/bin/bash, -ec]
    command:
      - |
        export KC_BOOTSTRAP_ADMIN_PASSWORD="$$(cat /run/secrets/keycloak_admin_password)"
        export KC_DB_PASSWORD="$$(cat /run/secrets/postgres_password)"
        export DEMO_ADMIN_PASSWORD="$$(cat /run/secrets/demo_admin_password)"
        export DEMO_BUILDER_PASSWORD="$$(cat /run/secrets/demo_builder_password)"
        export DEMO_VIEWER_PASSWORD="$$(cat /run/secrets/demo_viewer_password)"
        exec /opt/keycloak/bin/kc.sh start --import-realm --http-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ontology
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8083}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS_KC_HEAP: -Xms256m -Xmx512m
      PORTAL_PUBLIC_URL: ${PORTAL_PUBLIC_URL:-http://localhost:9080}
    ports:
      - 127.0.0.1:8083:8080
    secrets:
      - demo_admin_password
      - demo_builder_password
      - demo_viewer_password
      - keycloak_admin_password
      - postgres_password
    volumes:
      - ../config/keycloak/ontology-realm.json:/opt/keycloak/data/import/ontology-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: [CMD-SHELL, "exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped
